                      .shadow(color: .vipGold.opacity(0.5), radius: pulse ? 8 : 3).scaleEffect(pulse ? 1.05 : 1.0)
                      .onAppear { withAnimation(.easeInOut(duration: 1.5).repeatForever(autoreverses: true)) { pulse = true } }
