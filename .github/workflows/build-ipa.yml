              func handleInstall(file: IPAFile) { pendingInstallFile = file; showInstallSheet = true }
          
              func performSigning(file: IPAFile, cert: CertificateInfoModel) {
                  let ipaURL = URL(fileURLWithPath: file.localPath)
                  signingProgress = 0.0
                  signingStatus   = "⚙️ جاري التوقيع..."
          
                  certificateManager.signIPA(
                      ipaURL: ipaURL, with: cert,
                      progressHandler: { p, s in
                          DispatchQueue.main.async {
                              signingProgress = p * 0.85
                              signingStatus   = s
                          }
                      },
                      completion: { result in
                          switch result {
                          case .success(let signed):
                              downloadManager.markAsSigned(file, signedPath: signed.path, certificateId: cert.id)
                              HapticManager.shared.notification(.success)
                              NotificationManager.shared.notifySigningComplete(appName: file.fileName, iconURL: nil)
                              signingProgress = 0.87
                              signingStatus   = "📲 جاري التثبيت..."
                              let signedURL = URL(fileURLWithPath: signed.path)
                              let signedAppName  = file.fileName.replacingOccurrences(of: ".ipa", with: "")
                              let signedBundleID = "com.vip21.\(signedAppName.lowercased().replacingOccurrences(of: " ", with: ""))"
                              let signedVersion  = (Bundle.main.infoDictionary?["CFBundleShortVersionString"] as? String) ?? "1.0"
                              VIP21InstallEngine.shared.install(
                                  ipaURL:   signedURL,
                                  bundleID: signedBundleID,
                                  appName:  signedAppName,
                                  version:  signedVersion,
                                  progressHandler: { p, s in
                                      DispatchQueue.main.async {
                                          signingProgress = 0.87 + p * 0.13
                                          signingStatus   = s
                                      }
                                  },
                                  completion: { installResult in
                                      DispatchQueue.main.async {
                                          signingProgress = nil
                                          switch installResult {
                                          case .success:
                                              downloadManager.markAsInstalled(
                                                  downloadManager.ipaFiles.first { $0.id == file.id } ?? file,
                                                  method: "InstallEngine"
                                              )
                                              HapticManager.shared.notification(.success)
                                          case .failure(let err):
                                              pendingInstallFile = downloadManager.ipaFiles.first { $0.id == file.id } ?? file
                                              showInstallSheet   = true
                                              installErrorMsg    = err.localizedDescription
                                          }
                                      }
                                  }
                              )
                          case .failure(let err):
                              DispatchQueue.main.async {
                                  signingProgress = nil
                                  installErrorMsg  = err.localizedDescription
                                  showInstallError = true
                                  HapticManager.shared.notification(.error)
                              }
                          }
                      }
                  )
              }
          
              func shareIPA(file: IPAFile) {
                  let url = URL(fileURLWithPath: file.signedPath ?? file.localPath)
                  let name = file.fileName.replacingOccurrences(of: ".ipa", with: "")
                  let bid  = "com.vip21.\(name.lowercased().replacingOccurrences(of: " ", with: ""))"
                  let ver  = (Bundle.main.infoDictionary?["CFBundleShortVersionString"] as? String) ?? "1.0"
                  VIP21InstallEngine.shared.install(
                      ipaURL:   url,
                      bundleID: bid,
                      appName:  name,
                      version:  ver,
                      progressHandler: { _, _ in },
                      completion:      { _ in }
                  )
              }
          }
          
