          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - Notification Manager
          class NotificationManager {
              static let shared = NotificationManager()
              private init() {}
          
              func send(title: String, body: String, identifier: String = UUID().uuidString,
                        iconURL: String? = nil, delay: TimeInterval = 0.5) {
                  UNUserNotificationCenter.current().getNotificationSettings { settings in
                      guard settings.authorizationStatus == .authorized else { return }
                      let content = UNMutableNotificationContent()
                      content.title = title
                      content.body  = body
                      content.sound = .default
                      content.badge = 1
                      if let urlStr = iconURL, let url = URL(string: urlStr) {
                          self.attachIcon(url: url, content: content) { finalContent in
                              self.schedule(content: finalContent, identifier: identifier, delay: delay)
                          }
                      } else {
                          self.schedule(content: content, identifier: identifier, delay: delay)
                      }
                  }
              }
          
              private func attachIcon(url: URL, content: UNMutableNotificationContent, completion: @escaping (UNMutableNotificationContent) -> Void) {
                  URLSession.shared.dataTask(with: url) { data, _, _ in
                      guard let data = data,
                            let img = UIImage(data: data) else { completion(content); return }
                      let tmpURL = FileManager.default.temporaryDirectory
                          .appendingPathComponent(UUID().uuidString + ".png")
                      if let pngData = img.pngData(), (try? pngData.write(to: tmpURL)) != nil,
                         let att = try? UNNotificationAttachment(identifier: "icon", url: tmpURL, options: nil) {
                          content.attachments = [att]
                      }
                      completion(content)
                  }.resume()
              }
          
              private func schedule(content: UNMutableNotificationContent, identifier: String, delay: TimeInterval) {
                  let trigger = UNTimeIntervalNotificationTrigger(timeInterval: max(delay, 0.5), repeats: false)
                  let req = UNNotificationRequest(identifier: identifier, content: content, trigger: trigger)
                  UNUserNotificationCenter.current().add(req, withCompletionHandler: nil)
              }
          
              func scheduleDailyReminder() {
                  let content = UNMutableNotificationContent()
                  content.title = "🏪 متجر 21s"
                  content.body  = "تطبيقات جديدة تنتظرك — تفقد المتجر الآن! 🚀"
                  content.sound = .default
                  var dc = DateComponents(); dc.hour = 20; dc.minute = 0
                  let trigger = UNCalendarNotificationTrigger(dateMatching: dc, repeats: true)
                  let req = UNNotificationRequest(identifier: "daily_reminder", content: content, trigger: trigger)
                  UNUserNotificationCenter.current().add(req, withCompletionHandler: nil)
              }
          
              func notifyDownloadComplete(appName: String, iconURL: String?) {
                  send(title: "✅ اكتمل التحميل", body: "\(appName) جاهز للتوقيع والتثبيت!",
                       identifier: "dl_\(appName)", iconURL: iconURL, delay: 0.5)
              }
          
              func notifySigningComplete(appName: String, iconURL: String?) {
                  send(title: "✍️ تم التوقيع بنجاح", body: "\(appName) موقّع وجاهز للتثبيت!",
                       identifier: "sign_\(appName)", iconURL: iconURL, delay: 0.5)
              }
          
              func notifyInstallComplete(appName: String, iconURL: String?) {
                  send(title: "📲 تم التثبيت", body: "\(appName) مثبّت على جهازك بنجاح 🎉",
                       identifier: "install_\(appName)", iconURL: iconURL, delay: 0.5)
              }
          
              func notifyCertExpiry(certName: String, daysLeft: Int) {
                  send(title: "⚠️ تنبيه الشهادة", body: "شهادة \(certName) ستنتهي خلال \(daysLeft) يوم — جدّدها الآن",
                       identifier: "cert_expiry_\(certName)", delay: 1.0)
              }
          }
          VIPEOF
          echo "NotificationManager.swift: $(wc -l < NotificationManager.swift) lines"

      - name: Build Application
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          xcrun swiftc \
            Constants.swift \
            HapticManager.swift \
            Models.swift \
            VIPZipHelper.swift \
            SigningEngine.swift \
            Managers.swift \
            AppsManager.swift \
            SharedComponents.swift \
            ContentView.swift \
            HomeTabView.swift \
            AppsTabView.swift \
            InstallSupportViews.swift \
            SigningTabView.swift \
            AppDetailView.swift \
            SettingsView.swift \
            IPAPatcher.swift \
            VIP21StoreApp.swift \
            NotificationManager.swift \
            -sdk "$SDK" \
            -target arm64-apple-ios16.0 \
            -O \
            -module-name VIP21Store \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation \
            -framework Security \
            -framework UserNotifications \
            -framework Network \
            -framework CoreHaptics \
            -framework PhotosUI \
            -framework UniformTypeIdentifiers \
            -framework LocalAuthentication \
            -o VIP21Store
          file VIP21Store

      - name: Create IPA Package
        run: |
          mkdir -p artifacts
          rm -rf build-output
          mkdir -p build-output/Payload/VIP21Store.app
          cp VIP21Store                          build-output/Payload/VIP21Store.app/VIP21Store
          cp Resources/Info.plist                build-output/Payload/VIP21Store.app/Info.plist
          cp Resources/AppIcon60x60@2x.png       build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon76x76@2x~ipad.png  build-output/Payload/VIP21Store.app/
          cp Resources/AppIcon1024x1024.png      build-output/Payload/VIP21Store.app/
          cp Resources/apps_data.json            build-output/Payload/VIP21Store.app/
          ldid -S build-output/Payload/VIP21Store.app/VIP21Store
          cd build-output && zip -r -q ../artifacts/21s.ipa Payload/ && cd ..
          echo "IPA: $(du -sh artifacts/21s.ipa)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 21s-IPA-SwiftUI-v7
          path: artifacts/21s.ipa
