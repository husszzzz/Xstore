          struct CachedAsyncImage<Content: View>: View {
              let url: URL?
              @ViewBuilder let content: (AsyncImagePhase) -> Content
              var body: some View {
                  AsyncImage(url: url, transaction: Transaction(animation: .easeIn)) { content($0) }
              }
          }
          
          struct DocumentPicker: UIViewControllerRepresentable {
              let types: [UTType]
              let onPick: (URL) -> Void
          
              func makeCoordinator() -> Coordinator { Coordinator(onPick: onPick) }
          
              func makeUIViewController(context: Context) -> UIDocumentPickerViewController {
                  let picker = UIDocumentPickerViewController(forOpeningContentTypes: types)
                  picker.delegate = context.coordinator
                  picker.allowsMultipleSelection = false
                  return picker
              }
          
              func updateUIViewController(_ uiViewController: UIDocumentPickerViewController, context: Context) {}
          
              class Coordinator: NSObject, UIDocumentPickerDelegate {
                  let onPick: (URL) -> Void
                  init(onPick: @escaping (URL) -> Void) { self.onPick = onPick }
          
                  func documentPicker(_ controller: UIDocumentPickerViewController, didPickDocumentsAt urls: [URL]) {
                      guard let url = urls.first else { return }
                      let accessed = url.startAccessingSecurityScopedResource()
                      defer { if accessed { url.stopAccessingSecurityScopedResource() } }
          
                      let ext = url.pathExtension.isEmpty ? "bin" : url.pathExtension
                      let tmp = FileManager.default.temporaryDirectory
                          .appendingPathComponent(UUID().uuidString + "." + ext)
          
                      if let data = try? Data(contentsOf: url), (try? data.write(to: tmp)) != nil {
                          onPick(tmp)
                      } else if (try? FileManager.default.copyItem(at: url, to: tmp)) != nil {
                          onPick(tmp)
                      } else {
                          onPick(url)
                      }
                  }
              }
          }
          
          struct DataDocumentPicker: UIViewControllerRepresentable {
              let types: [UTType]
              let onPick: (Data, String) -> Void
          
              func makeCoordinator() -> Coordinator { Coordinator(onPick: onPick) }
          
              func makeUIViewController(context: Context) -> UIDocumentPickerViewController {
                  let picker = UIDocumentPickerViewController(forOpeningContentTypes: types)
                  picker.delegate = context.coordinator
                  picker.allowsMultipleSelection = false
                  picker.shouldShowFileExtensions = true
                  return picker
              }
          
              func updateUIViewController(_ uiViewController: UIDocumentPickerViewController, context: Context) {}
          
              class Coordinator: NSObject, UIDocumentPickerDelegate {
                  let onPick: (Data, String) -> Void
                  var selfRef: Coordinator?
                  init(onPick: @escaping (Data, String) -> Void) {
                      self.onPick = onPick
                      super.init()
                      selfRef = self
                  }
          
                  func documentPicker(_ controller: UIDocumentPickerViewController,
                                      didPickDocumentsAt urls: [URL]) {
                      guard let url = urls.first else { selfRef = nil; return }
                      let name = url.lastPathComponent
                      let accessed = url.startAccessingSecurityScopedResource()
          
                      func finish(data: Data) {
                          if accessed { url.stopAccessingSecurityScopedResource() }
                          DispatchQueue.main.async { [weak self] in
                              self?.onPick(data, name)
                              self?.selfRef = nil
                          }
                      }
          
                      if let data = try? Data(contentsOf: url), !data.isEmpty {
                          finish(data: data); return
                      }
          
                      let ext  = url.pathExtension.isEmpty ? "bin" : url.pathExtension
                      let tmp  = FileManager.default.temporaryDirectory
                          .appendingPathComponent(UUID().uuidString + "." + ext)
                      do {
                          try FileManager.default.copyItem(at: url, to: tmp)
                          if let data = try? Data(contentsOf: tmp), !data.isEmpty {
                              finish(data: data); return
                          }
                      } catch {}
          
                      var coordErr: NSError?
                      NSFileCoordinator().coordinate(
                          readingItemAt: url, options: [.withoutChanges],
                          error: &coordErr
                      ) { coordURL in
                          if let data = try? Data(contentsOf: coordURL), !data.isEmpty {
                              finish(data: data)
                          } else {
                              if accessed { url.stopAccessingSecurityScopedResource() }
                              DispatchQueue.main.async { [weak self] in self?.selfRef = nil }
                          }
                      }
                  }
          
                  func documentPickerWasCancelled(_ controller: UIDocumentPickerViewController) {
                      selfRef = nil
                  }
              }
          }
          
          struct ImagePicker: UIViewControllerRepresentable {
              @Binding var image: UIImage?
              func makeCoordinator() -> Coordinator { Coordinator(image: $image) }
              func makeUIViewController(context: Context) -> UIImagePickerController {
                  let picker = UIImagePickerController()
                  picker.delegate = context.coordinator
                  picker.allowsEditing = true; return picker
              }
              func updateUIViewController(_ uiViewController: UIImagePickerController, context: Context) {}
              class Coordinator: NSObject, UIImagePickerControllerDelegate, UINavigationControllerDelegate {
                  @Binding var image: UIImage?
                  init(image: Binding<UIImage?>) { _image = image }
                  func imagePickerController(_ picker: UIImagePickerController,
                                             didFinishPickingMediaWithInfo info: [UIImagePickerController.InfoKey: Any]) {
                      image = info[.editedImage] as? UIImage ?? info[.originalImage] as? UIImage
                      picker.dismiss(animated: true)
                  }
              }
          }
          
