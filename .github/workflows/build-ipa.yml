              }
          }
          
          // MARK: - Cert Card View
          struct CertCardView: View {
              let cert: CertificateInfoModel; let isSelected: Bool
              let onSelect: () -> Void; let onDelete: () -> Void
              @State private var showDetails = false; @Environment(\.colorScheme) var scheme
          
