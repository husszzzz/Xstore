      - name: Generate Source - IPAPatcher.swift
        run: |
          cat > IPAPatcher.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - IPA Patcher Engine
          class IPAPatcher {
              static let shared = IPAPatcher()
              private let fm = FileManager.default
          
              private let iconSizes: [(name: String, size: CGFloat)] = [
                  ("AppIcon20x20@1x.png",    20),  ("AppIcon20x20@2x.png",    40),
                  ("AppIcon20x20@3x.png",    60),  ("AppIcon29x29@1x.png",    29),
                  ("AppIcon29x29@2x.png",    58),  ("AppIcon29x29@3x.png",    87),
                  ("AppIcon40x40@1x.png",    40),  ("AppIcon40x40@2x.png",    80),
                  ("AppIcon40x40@3x.png",   120),  ("AppIcon60x60@2x.png",   120),
                  ("AppIcon60x60@3x.png",   180),  ("AppIcon76x76@1x.png",    76),
                  ("AppIcon76x76@2x.png",   152),  ("AppIcon83.5x83.5@2x.png",167),
                  ("AppIcon1024x1024.png", 1024),
              ]
          
              struct PatchOptions {
                  var newName:         String?
                  var newDisplayName:  String?
                  var newBundleID:     String?
                  var newIcon:         UIImage?
                  var duplicate:       Bool = false
              }
          
              func patchIPA(
                  sourceURL: URL,
                  options: PatchOptions,
                  progressHandler: @escaping (Double, String) -> Void,
                  completion: @escaping (Result<URL, Error>) -> Void
              ) {
                  DispatchQueue.global(qos: .userInitiated).async { [weak self] in
                      guard let self else { return }
                      do {
                          let output = try self.performPatch(sourceURL: sourceURL,
                                                             options: options,
                                                             progress: progressHandler)
                          DispatchQueue.main.async { completion(.success(output)) }
                      } catch {
                          DispatchQueue.main.async { completion(.failure(error)) }
                      }
                  }
              }
          
              private func performPatch(
                  sourceURL: URL,
                  options: PatchOptions,
                  progress: @escaping (Double, String) -> Void
              ) throws -> URL {
                  let fm = FileManager.default
                  let tmp = fm.temporaryDirectory.appendingPathComponent("patch_\(UUID().uuidString)")
                  try fm.createDirectory(at: tmp, withIntermediateDirectories: true)
                  defer { try? fm.removeItem(at: tmp) }
          
                  let extractDir = tmp.appendingPathComponent("extracted")
                  try fm.createDirectory(at: extractDir, withIntermediateDirectories: true)
          
                  progress(0.05, "📦 فك ضغط IPA...")
                  try shellExtract(from: sourceURL, to: extractDir)
          
                  progress(0.20, "🔍 البحث عن .app bundle...")
                  let payloadDir = extractDir.appendingPathComponent("Payload")
                  guard fm.fileExists(atPath: payloadDir.path),
                        let appBundle = (try? fm.contentsOfDirectory(
                          at: payloadDir, includingPropertiesForKeys: nil
                        ))?.first(where: { $0.pathExtension == "app" })
                  else {
                      throw NSError(domain: "IPAPatcher", code: 1,
                                    userInfo: [NSLocalizedDescriptionKey: "لم يُعثر على .app داخل IPA"])
                  }
          
                  if options.newName != nil || options.newDisplayName != nil || options.newBundleID != nil {
                      progress(0.30, "📝 تعديل Info.plist...")
                      let plistURL = appBundle.appendingPathComponent("Info.plist")
                      if fm.fileExists(atPath: plistURL.path),
                         let rawData = try? Data(contentsOf: plistURL),
                         var plist = (try? PropertyListSerialization.propertyList(
                             from: rawData, options: [], format: nil)) as? [String: Any] {
                          if let n  = options.newName        { plist["CFBundleName"]        = n }
                          if let dn = options.newDisplayName { plist["CFBundleDisplayName"] = dn }
                          if let b  = options.newBundleID    { plist["CFBundleIdentifier"]  = b }
                          if let patched = try? PropertyListSerialization.data(
                              fromPropertyList: plist, format: .binary, options: 0) {
                              try patched.write(to: plistURL, options: .atomicWrite)
                          }
                      }
                  }
          
                  if let icon = options.newIcon {
                      progress(0.45, "🎨 تغيير الأيقونة...")
                      for spec in iconSizes {
                          let dest = appBundle.appendingPathComponent(spec.name)
                          if let png = resizeIcon(icon, to: spec.size) {
                              try? png.write(to: dest, options: .atomicWrite)
                          }
                      }
                  }
          
                  progress(0.65, "🗜 إعادة ضغط IPA...")
                  let originalBase = sourceURL.deletingPathExtension().lastPathComponent
                  let suffix       = options.duplicate ? "_clone_\(Int.random(in: 1000...9999))" : "_patched"
                  let outName      = (options.newName ?? originalBase) + suffix + ".ipa"
                  let outURL       = fm.urls(for: .documentDirectory, in: .userDomainMask)[0]
                      .appendingPathComponent("IPA").appendingPathComponent(outName)
                  try? fm.createDirectory(at: outURL.deletingLastPathComponent(),
                                          withIntermediateDirectories: true)
                  if fm.fileExists(atPath: outURL.path) { try fm.removeItem(at: outURL) }
          
                  try shellCreateZip(from: extractDir, to: outURL)
          
                  progress(1.0, "✅ اكتملت عملية التعديل!")
                  return outURL
              }
          
              private func shellExtract(from zipURL: URL, to destDir: URL) throws {
                  guard let reader = try? VIPZipReader(url: zipURL) else {
                      throw NSError(domain: "IPAPatcher", code: 2,
                                    userInfo: [NSLocalizedDescriptionKey: "فشل فك ضغط IPA — تأكد من اكتمال الملف"])
                  }
                  try reader.extractAll(to: destDir)
              }
          
              private func shellCreateZip(from sourceDir: URL, to zipURL: URL) throws {
                  guard let zipData = try? VIPZipWriter.createZip(from: sourceDir) else {
                      throw NSError(domain: "IPAPatcher", code: 3,
                                    userInfo: [NSLocalizedDescriptionKey: "فشل إنشاء IPA المعدَّل"])
                  }
                  try zipData.write(to: zipURL, options: Data.WritingOptions.atomic)
              }
          
              private func resizeIcon(_ image: UIImage, to size: CGFloat) -> Data? {
                  let s = CGSize(width: size, height: size)
                  UIGraphicsBeginImageContextWithOptions(s, false, 1.0)
                  image.draw(in: CGRect(origin: .zero, size: s))
                  let resized = UIGraphicsGetImageFromCurrentImageContext()
                  UIGraphicsEndImageContext()
                  return resized?.pngData()
              }
          }
          
          // MARK: - IPA Patch Sheet
          struct IPAPatchSheet: View {
              let file: IPAFile
              @ObservedObject var downloadManager: IPADownloadManager
              @Environment(\.dismiss) var dismiss
              @Environment(\.colorScheme) var scheme
          
              @State private var newName:        String = ""
              @State private var newDisplayName: String = ""
              @State private var newBundleID:    String = ""
              @State private var asDuplicate:    Bool   = false
          
              @State private var isPatching      = false
              @State private var patchProgress:  Double?
              @State private var patchStatus     = ""
              @State private var patchResult:    String?
              @State private var patchSuccess    = false
          
              var body: some View {
                  NavigationView {
                      ScrollView {
                          VStack(spacing: 20) {
          
                              Spacer(minLength: 6)
          
                              VStack(spacing: 14) {
                                  patchField(title: "اسم التطبيق (CFBundleName)",
                                             placeholder: "مثال: MyApp",
                                             text: $newName,
                                             icon: "textformat", color: .vipPurple)
          
                                  patchField(title: "الاسم الظاهر على الشاشة",
                                             placeholder: "مثال: تطبيقي",
                                             text: $newDisplayName,
                                             icon: "tag.fill", color: .blue)
          
                                  patchField(title: "Bundle ID",
                                             placeholder: "مثال: com.myteam.myapp",
                                             text: $newBundleID,
                                             icon: "barcode", color: .indigo,
                                             keyboard: .asciiCapable)
                              }
                              .padding(.horizontal)
          
                              Toggle(isOn: $asDuplicate) {
                                  VStack(alignment: .leading, spacing: 2) {
                                      Text("حفظ كنسخة مكرّرة").font(.system(size: 14, weight: .semibold))
                                      Text("يحتفظ بالملف الأصلي ويُنشئ ملفاً جديداً")
                                          .font(.system(size: 11)).foregroundColor(.gray)
                                  }
                              }
                              .padding(14)
                              .glassCard(radius: 14)
                              .padding(.horizontal)
          
                              if let p = patchProgress {
                                  VStack(spacing: 6) {
                                      ProgressView(value: p)
                                          .progressViewStyle(LinearProgressViewStyle(tint: .vipPurple))
                                      Text(patchStatus).font(.system(size: 11)).foregroundColor(.gray)
                                  }.padding(.horizontal)
                              }
          
                              if let result = patchResult {
                                  Text(result)
                                      .font(.system(size: 13))
                                      .foregroundColor(patchSuccess ? .green : .red)
                                      .multilineTextAlignment(.center)
                                      .padding(.horizontal)
                              }
          
                              GradientButton(
                                  title: isPatching ? "جاري التعديل..." : (asDuplicate ? "تكرار وتعديل" : "تطبيق التعديلات"),
                                  icon: asDuplicate ? "doc.on.doc.fill" : "wand.and.stars",
                                  gradient: [.vipPurple, .blue],
                                  action: applyPatch,
                                  isDisabled: isPatching || nothingChanged
                              ).padding(.horizontal)
          
                              Spacer(minLength: 30)
                          }
                      }
                      .navigationTitle(asDuplicate ? "تكرار وتعديل IPA" : "تعديل IPA")
                      .navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .navigationBarLeading) {
                              Button("إلغاء") { dismiss() }.foregroundColor(.red)
                          }
                      }
                  }
              }
          
              var nothingChanged: Bool {
                  newName.isEmpty && newDisplayName.isEmpty && newBundleID.isEmpty
              }
          
              @ViewBuilder
              func patchField(title: String, placeholder: String, text: Binding<String>,
                              icon: String, color: Color,
                              keyboard: UIKeyboardType = .default) -> some View {
                  VStack(alignment: .trailing, spacing: 6) {
                      Text(title).font(.system(size: 12, weight: .medium)).foregroundColor(.gray)
                          .frame(maxWidth: .infinity, alignment: .trailing)
                      HStack(spacing: 10) {
                          TextField(placeholder, text: text)
                              .font(.system(size: 14))
                              .keyboardType(keyboard)
                              .autocapitalization(.none)
                              .disableAutocorrection(true)
                              .multilineTextAlignment(.trailing)
                          Image(systemName: icon)
                              .foregroundColor(color)
                              .frame(width: 28)
                      }
                      .padding(12)
                      .background(RoundedRectangle(cornerRadius: 12)
                          .fill(Color(UIColor.systemBackground).opacity(0.06))
                          .overlay(RoundedRectangle(cornerRadius: 12)
                              .stroke(text.wrappedValue.isEmpty ? Color.gray.opacity(0.2) : color.opacity(0.5), lineWidth: 1)))
                  }
              }
          
              func applyPatch() {
                  let srcURL = URL(fileURLWithPath: file.localPath)
                  isPatching   = true
                  patchProgress = 0
                  patchResult   = nil
          
                  let opts = IPAPatcher.PatchOptions(
                      newName:         newName.isEmpty        ? nil : newName,
                      newDisplayName:  newDisplayName.isEmpty ? nil : newDisplayName,
                      newBundleID:     newBundleID.isEmpty    ? nil : newBundleID,
                      newIcon:         nil,
                      duplicate:       asDuplicate
                  )
          
                  IPAPatcher.shared.patchIPA(sourceURL: srcURL, options: opts,
                      progressHandler: { p, s in
                          patchProgress = p; patchStatus = s
                      },
                      completion: { result in
                          isPatching = false
                          switch result {
                          case .success(let outURL):
                              patchSuccess = true
                              patchResult  = "✅ تم الحفظ:\n\(outURL.lastPathComponent)"
                              downloadManager.importIPAFromURL(url: outURL)
                              HapticManager.shared.notification(.success)
                              DispatchQueue.main.asyncAfter(deadline: .now() + 1.5) { dismiss() }
                          case .failure(let err):
                              patchSuccess = false
                              patchResult  = "❌ \(err.localizedDescription)"
                              patchProgress = nil
                              HapticManager.shared.notification(.error)
                          }
                      }
                  )
              }
          }
          VIPEOF
          echo "IPAPatcher.swift: $(wc -l < IPAPatcher.swift) lines"

      - name: Generate Source - VIP21StoreApp.swift
        run: |
          cat > VIP21StoreApp.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - App Entry Point
          @main
          struct VIP21StoreApp: App {
              @UIApplicationDelegateAdaptor(AppDelegate.self) var appDelegate
              @StateObject private var cloud = VIP21Cloud.shared
          
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                          .environmentObject(cloud)
                          .onAppear {
                              VIP21Cloud.shared.start()
                          }
                  }
              }
          }
          
          class AppDelegate: NSObject, UIApplicationDelegate, UNUserNotificationCenterDelegate {
          
              func application(_ application: UIApplication,
                               didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]? = nil) -> Bool {
                  UNUserNotificationCenter.current().delegate = self
                  UNUserNotificationCenter.current().requestAuthorization(options: [.alert, .sound, .badge]) { granted, _ in
                      if granted { NotificationManager.shared.scheduleDailyReminder() }
                  }
                  VIP21Cloud.shared.start()
                  return true
              }
          
              func userNotificationCenter(_ center: UNUserNotificationCenter,
                                           willPresent notification: UNNotification,
                                           withCompletionHandler handler: @escaping (UNNotificationPresentationOptions) -> Void) {
                  handler([.banner, .sound, .badge])
              }
          
              func userNotificationCenter(_ center: UNUserNotificationCenter,
                                           didReceive response: UNNotificationResponse,
                                           withCompletionHandler handler: @escaping () -> Void) {
                  handler()
              }
          }
          
          // MARK: - VIP21Cloud
          final class VIP21Cloud: ObservableObject {
              static let shared = VIP21Cloud()
              @Published var isConnected: Bool = false
              private var timer: Timer?
          
              private init() {}
          
              func start() {
                  guard timer == nil else { return }
                  timer = Timer.scheduledTimer(withTimeInterval: 60, repeats: true) { [weak self] _ in
                      self?.ping()
                  }
                  ping()
              }
          
              private func ping() {
                  guard let url = URL(string: "https://repository.apptesters.org/apps.json") else { return }
                  var req = URLRequest(url: url, cachePolicy: .reloadIgnoringLocalCacheData, timeoutInterval: 10)
                  req.setValue("VIP21Store/7.0", forHTTPHeaderField: "User-Agent")
                  URLSession.shared.dataTask(with: req) { [weak self] data, _, err in
                      DispatchQueue.main.async {
                          self?.isConnected = (data != nil && err == nil)
                      }
                  }.resume()
              }
          }
          VIPEOF
          echo "VIP21StoreApp.swift: $(wc -l < VIP21StoreApp.swift) lines"

