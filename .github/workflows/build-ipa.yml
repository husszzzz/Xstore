          // MARK: - Glass Card Modifier
          extension View {
              func glassCard(radius: CGFloat = 20, padding: CGFloat = 0) -> some View {
                  self
                      .background(
                          RoundedRectangle(cornerRadius: radius)
                              .fill(Color(UIColor.systemBackground).opacity(0.08))
                              .background(
                                  RoundedRectangle(cornerRadius: radius)
                                      .fill(Color(UIColor { t in t.userInterfaceStyle == .dark
