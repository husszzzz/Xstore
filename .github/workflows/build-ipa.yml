                                      .fill(LinearGradient(colors: [.vipPurple, .cyan], startPoint: .leading, endPoint: .trailing))
                                      .frame(width: geo.size.width * progress, height: 4)
                                      .animation(.easeInOut(duration: 0.4), value: progress)
                              }
                          }.frame(height: 4).padding(.horizontal, 20)
          
                          ScrollView(showsIndicators: false) {
                              VStack(alignment: .leading, spacing: 4) {
                                  ForEach(Array(logLines.suffix(8).enumerated()), id: \.offset) { idx, line in
                                      HStack(spacing: 6) {
                                          Text("›").foregroundColor(.green).font(.system(size: 10, design: .monospaced))
                                          Text(line)
                                              .font(.system(size: 11, design: .monospaced))
                                              .foregroundColor(line.contains("✅") ? .green : line.contains("❌") ? .red : .white.opacity(0.75))
                                      }
                                  }
                              }
                              .frame(maxWidth: .infinity, alignment: .leading)
                              .padding(14)
                          }
                          .frame(height: 120)
                          .background(Color.black.opacity(0.4))
                      }
                      .background(
                          RoundedRectangle(cornerRadius: 24)
                              .fill(Color(red: 0.08, green: 0.07, blue: 0.16))
                              .overlay(RoundedRectangle(cornerRadius: 24).stroke(Color.vipPurple.opacity(0.3), lineWidth: 1))
                      )
                      .shadow(color: .vipPurple.opacity(0.3), radius: 30)
                      .padding(.horizontal, 20)
                  }
                  .onAppear { startLogAnimation() }
                  .onDisappear { timer?.invalidate() }
              }
          
              private func startLogAnimation() {
                  var stepIdx = 0
                  timer = Timer.scheduledTimer(withTimeInterval: 0.6, repeats: true) { t in
                      if stepIdx < signingSteps.count {
                          logLines.append(signingSteps[stepIdx]); stepIdx += 1
                      } else { t.invalidate() }
                  }
              }
          }
          
          // MARK: - Signing Sheet
          struct SigningSheetView: View {
              let ipaFile: IPAFile; let certificates: [CertificateInfoModel]
              let selectedCertId: UUID?; let onSign: (CertificateInfoModel) -> Void
              @Environment(\.dismiss) var dismiss; @Environment(\.colorScheme) var scheme
              @State private var selectedCert: CertificateInfoModel?
          
              var body: some View {
                  NavigationView {
                      VStack(spacing: 0) {
                          VStack(spacing: 8) {
                              Image(systemName: "signature").font(.system(size: 40))
                                  .foregroundStyle(LinearGradient(colors: [.vipPurple, .blue], startPoint: .top, endPoint: .bottom))
                              Text(ipaFile.fileName).font(.system(size: 16, weight: .semibold)).lineLimit(1)
                              Text("اختر شهادة للتوقيع").font(.system(size: 13)).foregroundColor(.gray)
                          }.padding(.vertical, 20)
          
                          if certificates.isEmpty {
                              VStack(spacing: 12) {
                                  Image(systemName: "exclamationmark.triangle.fill").font(.system(size: 40)).foregroundColor(.orange)
                                  Text("لا توجد شهادات").font(.system(size: 16, weight: .semibold))
                                  Text("أضف شهادة من تبويب الإعدادات").font(.system(size: 13)).foregroundColor(.gray)
                              }.frame(maxWidth: .infinity).padding(.top, 40)
                          } else {
                              List(certificates) { cert in
                                  Button(action: { selectedCert = cert; HapticManager.shared.selection() }) {
                                      HStack(spacing: 14) {
                                          ZStack {
                                              Circle().stroke(Color.gray.opacity(0.2), lineWidth: 2)
                                              Circle().trim(from: 0, to: CGFloat(cert.healthScore) / 100.0)
                                                  .stroke(cert.expiryStatusColor, style: StrokeStyle(lineWidth: 2, lineCap: .round))
                                                  .rotationEffect(.degrees(-90))
                                          }.frame(width: 32, height: 32)
                                          VStack(alignment: .leading, spacing: 3) {
                                              Text(cert.displayName).font(.system(size: 15, weight: .medium))
                                              Text(cert.expiryText).font(.system(size: 11)).foregroundColor(cert.expiryStatusColor)
                                              if !cert.isValid { Text("⚠️ منتهية الصلاحية").font(.system(size: 10)).foregroundColor(.red) }
                                          }
                                          Spacer()
                                          if selectedCert?.id == cert.id {
                                              Image(systemName: "checkmark.circle.fill").foregroundColor(.vipPurple).font(.system(size: 22))
                                          }
                                      }.padding(.vertical, 8)
                                  }.buttonStyle(PlainButtonStyle())
                              }.frame(maxHeight: 340)
                          }
          
                          GradientButton(
                              title: "توقيع بـ zsign",
                              icon: "signature",
                              gradient: selectedCert?.isValid == true ? [.vipPurple, .blue] : [.gray, .gray.opacity(0.7)],
                              action: {
                                  if let cert = selectedCert { onSign(cert); dismiss() }
                              },
                              isDisabled: selectedCert == nil || selectedCert?.isValid == false
                          ).padding(.horizontal, 20).padding(.bottom, 20)
                      }
                      .navigationTitle("اختر شهادة التوقيع").navigationBarTitleDisplayMode(.inline)
                      .toolbar {
                          ToolbarItem(placement: .navigationBarTrailing) {
                              Button("إلغاء") { dismiss() }.foregroundColor(.vipPurple)
                          }
                      }
                  }
                  .onAppear { selectedCert = certificates.first(where: { $0.isValid }) ?? certificates.first }
              }
          }
          VIPEOF
          echo "SigningTabView.swift: $(wc -l < SigningTabView.swift) lines"

