                      GradientButton(title: "إعادة المحاولة", icon: "arrow.clockwise", gradient: [.orange, .red], action: onRetry)
                          .frame(width: 180)
                  }.padding().frame(maxWidth: .infinity).padding(.top, 80)
              }
          }
          
          struct MarqueeText: View {
              let text: String
              var font: Font = .system(size: 13, weight: .semibold)
              var color: Color = .white
              var speed: Double = 28
          
              @State private var offset: CGFloat = 0
              @State private var textWidth: CGFloat = 0
          
              var body: some View {
                  GeometryReader { geo in
                      let gap: CGFloat = 60
                      HStack(spacing: gap) {
                          marqueeContent
                          marqueeContent
                      }
                      .offset(x: offset)
                      .background(
                          GeometryReader { inner -> Color in
                              let w = (inner.size.width - gap) / 2
                              DispatchQueue.main.async {
                                  if textWidth != w { textWidth = w; startAnimation(gap: gap) }
                              }
                              return Color.clear
                          }
                      )
                      .frame(width: geo.size.width, alignment: .leading)
                      .clipped()
                  }
                  .frame(height: 22)
              }
          
              private var marqueeContent: some View {
                  Text(text).font(font).foregroundColor(color).fixedSize(horizontal: true, vertical: false)
              }
          
              private func startAnimation(gap: CGFloat) {
                  let distance = textWidth + gap
                  offset = 0
                  let duration = Double(distance) / speed
                  withAnimation(.linear(duration: duration).repeatForever(autoreverses: false)) {
                      offset = -distance
                  }
              }
          }
          
