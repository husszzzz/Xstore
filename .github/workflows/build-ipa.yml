      - name: Generate Source - Models.swift
        run: |
          cat > Models.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - IPA File Model
          struct IPAFile: Identifiable, Codable {
              var id = UUID()
              let fileName: String
              let localPath: String
              let originalURL: String
              let fileSize: String
              let fileSizeBytes: Int64
              let date: String
              var isSigned: Bool = false
              var signedPath: String?
              var isInstalled: Bool = false
              var installDate: Date?
              var signingCertificateId: UUID?
              var isFavorite: Bool = false
          
              enum CodingKeys: String, CodingKey {
                  case id, fileName, localPath, originalURL, fileSize, fileSizeBytes,
                       date, isSigned, signedPath, isInstalled, installDate,
                       signingCertificateId, isFavorite
              }
          }
          
          // MARK: - App Data Model
          struct AppItem: Identifiable, Codable {
              var id = UUID()
              let name: String
              let type: Int
              let bundleID: String
              let bundleIdentifier: String
              let version: String
              let versionDate: String
              let fullDate: String
              let size: Int
              let down: String
              let downloadURL: String
              let developerName: String
              let localizedDescription: String
              let icon: String
              let iconURL: String
              var category: String?
          
              enum CodingKeys: String, CodingKey {
                  case name, type, bundleID, bundleIdentifier, version, versionDate,
                       fullDate, size, down, downloadURL, developerName,
                       localizedDescription, icon, iconURL
              }
          
              var formattedSize: String { ByteCountFormatter.string(fromByteCount: Int64(size), countStyle: .file) }
          
              var formattedDate: String {
                  let input = DateFormatter(); input.dateFormat = "yyyy-MM-dd"
                  if let d = input.date(from: versionDate) {
                      let out = DateFormatter(); out.dateFormat = "dd-MM-yyyy"; return out.string(from: d)
                  }
                  return versionDate
              }
          
              var subscriptionType: String {
                  if localizedDescription.contains("Subscription Unlocked") { return "الاشتراك مدى الحياة" }
                  if localizedDescription.contains("Premium") { return "بريميوم" }
                  if localizedDescription.contains("Pro")     { return "Pro" }
                  if localizedDescription.contains("Gold")    { return "Gold" }
                  if localizedDescription.contains("IAP")     { return "المشتريات مفعّلة" }
                  return "مفعّل"
              }
          
              var isNew: Bool {
                  let f = DateFormatter(); f.dateFormat = "yyyy-MM-dd"
                  guard let d = f.date(from: versionDate) else { return false }
                  return Calendar.current.dateComponents([.day], from: d, to: Date()).day ?? 999 < 7
              }
          
              var isPopular: Bool { (Int(down) ?? 0) > 500 }
          
              var _secureDownloadURL: String { downloadURL }
          }
          
          // MARK: - Install Record
          struct InstallRecord: Identifiable, Codable {
              var id = UUID()
              let appName: String
              let bundleID: String
              let version: String
              let installDate: Date
              let iconURL: String
              var installMethod: String
          }
          
          // MARK: - Source Platform
          enum SourcePlatform: String, CaseIterable {
              case instagram = "Instagram"; case tiktok = "TikTok"
              case telegram  = "Telegram";  case youtube = "YouTube"
              case friend    = "صديق"
          
              var icon: String {
                  switch self {
                  case .instagram: return "camera.fill"
                  case .tiktok:    return "music.note"
                  case .telegram:  return "paperplane.fill"
                  case .youtube:   return "play.rectangle.fill"
                  case .friend:    return "person.2.fill"
                  }
              }
          
              var gradient: [Color] {
                  switch self {
                  case .instagram: return [.purple, .pink, .orange]
                  case .tiktok:    return [.black, Color(red: 0.0, green: 0.8, blue: 0.67)]
                  case .telegram:  return [Color(red: 0.0, green: 0.6, blue: 1.0), .blue]
                  case .youtube:   return [.red, Color(red: 0.8, green: 0.0, blue: 0.0)]
                  case .friend:    return [.green, .teal]
                  }
              }
          }
          
          // MARK: - API Response
          struct AppsResponse: Codable {
              let name: String; let identifier: String; let sourceURL: String
              let iconURL: String; let website: String; let ipawebsite: String
              let subtitle: String; let apps: [AppItem]
          }
          
          // MARK: - User Profile
          struct UserProfile: Codable {
              var userName: String
              var profileImageData: Data?
              var memberSince: Date
              var sourcePlatform: String?
              var hasCompletedOnboarding: Bool = false
              var totalInstalls: Int = 0
              var favoriteApps: [String] = []
          
              var profileImage: UIImage? {
                  guard let d = profileImageData else { return nil }
                  return UIImage(data: d)
              }
          
              static let defaultProfile = UserProfile(
                  userName: "1-21s",
                  profileImageData: nil,
                  memberSince: Date(),
                  sourcePlatform: nil,
                  hasCompletedOnboarding: true
              )
          }
          
          // MARK: - App Category
          struct AppCategory: Identifiable {
              let id = UUID()
              let name: String; let icon: String; let gradient: [Color]
          }
          
          // MARK: - Array Extension
          extension Array where Element: Equatable {
              func firstRange(of needle: [Element]) -> Range<Int>? {
                  guard !needle.isEmpty, needle.count <= count else { return nil }
                  for startIdx in 0...(count - needle.count) {
                      if self[startIdx..<startIdx + needle.count].elementsEqual(needle) {
                          return startIdx..<startIdx + needle.count
                      }
                  }
                  return nil
              }
          }
          
          // MARK: - Certificate Model
          struct CertificateInfoModel: Identifiable, Codable {
              var id = UUID()
              let name: String
              let p12DataString: String
              let mobileProvisionDataString: String
              let password: String
              let displayName: String
              let creationDate: Date
              let expiryDate: Date?
              let certificateName: String?
              var teamID: String?
          
              var isValid: Bool {
                  guard let expiry = expiryDate else { return true }
                  return expiry > Date()
              }
          
              var daysRemaining: Int? {
                  guard let expiry = expiryDate else { return nil }
                  return Calendar.current.dateComponents([.day], from: Date(), to: expiry).day
              }
          
              var expiryStatusColor: Color {
                  guard let d = daysRemaining else { return .gray }
                  if d < 0  { return .red }
                  if d < 7  { return .orange }
                  if d < 30 { return Color(red: 1.0, green: 0.6, blue: 0.0) }
                  return .green
              }
          
              var expiryText: String {
                  guard let d = daysRemaining else { return "غير معروف" }
                  if d < 0  { return "منتهية منذ \(abs(d)) يوم" }
                  if d == 0 { return "تنتهي اليوم!" }
                  return "متبقي \(d) يوم"
              }
          
              var healthScore: Int {
                  guard let d = daysRemaining else { return 50 }
                  if d < 0  { return 0 }
                  if d < 7  { return 25 }
                  if d < 30 { return 60 }
                  return 100
              }
          
              var p12Data: Data { Data(base64Encoded: p12DataString) ?? Data() }
              var mobileProvisionData: Data { Data(base64Encoded: mobileProvisionDataString) ?? Data() }
          
              init(id: UUID = UUID(), name: String, p12Data: Data, mobileProvisionData: Data,
                   password: String, displayName: String, creationDate: Date) {
                  self.id = id
                  self.name = name
                  self.p12DataString = p12Data.base64EncodedString()
                  self.mobileProvisionDataString = mobileProvisionData.base64EncodedString()
                  self.password = password
                  self.displayName = displayName
                  self.creationDate = creationDate
                  self.expiryDate = Self.extractExpiryDate(from: mobileProvisionData)
                  let (certName, tid) = Self.extractCertInfo(from: p12Data, password: password)
                  self.certificateName = certName
                  self.teamID = tid
              }
          
              private static func extractExpiryDate(from data: Data) -> Date? {
                  let bytes = [UInt8](data)
                  let xmlMarker = Array("<?xml".utf8)
                  let plistEnd  = Array("</plist>".utf8)
                  if let startIdx = bytes.firstRange(of: xmlMarker),
                     let endRange  = bytes.firstRange(of: plistEnd) {
                      let xmlData = Data(bytes[startIdx.lowerBound..<endRange.upperBound])
                      if let dict = try? PropertyListSerialization.propertyList(
                          from: xmlData, options: [], format: nil) as? [String: Any],
                         let expiry = dict["ExpirationDate"] as? Date {
                          return expiry
                      }
                  }
                  let rawStr = String(data: data, encoding: .ascii) ?? String(data: data, encoding: .utf8) ?? ""
                  let pattern = "ExpirationDate</key>\\s*<date>(.*?)</date>"
                  if let regex  = try? NSRegularExpression(pattern: pattern, options: .dotMatchesLineSeparators),
                     let match  = regex.firstMatch(in: rawStr, range: NSRange(rawStr.startIndex..., in: rawStr)),
                     let range  = Range(match.range(at: 1), in: rawStr) {
                      return ISO8601DateFormatter().date(from: String(rawStr[range]))
                  }
                  return nil
              }
          
              private static func extractCertInfo(from data: Data, password: String) -> (String?, String?) {
                  let passwords = [password, password.trimmingCharacters(in: .whitespaces), ""]
                  for pwd in passwords {
                      let opts: [String: Any] = [kSecImportExportPassphrase as String: pwd]
                      var items: CFArray?
                      guard SecPKCS12Import(data as CFData, opts as CFDictionary, &items) == errSecSuccess,
                            let arr  = items as? [[String: Any]],
                            let first = arr.first,
                            let raw   = first[kSecImportItemIdentity as String],
                            CFGetTypeID(raw as CFTypeRef) == SecIdentityGetTypeID() else { continue }
                      let identity = raw as! SecIdentity
                      var cert: SecCertificate?
                      SecIdentityCopyCertificate(identity, &cert)
                      guard let c = cert else { continue }
                      let summary = SecCertificateCopySubjectSummary(c) as String? ?? ""
                      var teamID: String?
                      if let open  = summary.lastIndex(of: "("),
                         let close = summary.lastIndex(of: ")"),
                         open < close {
                          let t = String(summary[summary.index(after: open)..<close])
                          if t.count == 10 { teamID = t }
                      }
                      return (summary.isEmpty ? nil : summary, teamID)
                  }
                  return (nil, nil)
              }
          }
          
          // MARK: - Download Status
          enum DownloadStatus: String {
              case waiting = "في الانتظار"; case downloading = "جاري التحميل"
              case completed = "مكتمل"; case failed = "فشل"; case paused = "متوقف"
          }
          
          // MARK: - Active Download
          class ActiveDownload: ObservableObject, Identifiable {
              let id = UUID()
              let appName: String; let appIconURL: String
              let downloadURL: URL; let appItem: AppItem?
              @Published var progress: Double = 0
              @Published var downloadedBytes: Int64 = 0
              @Published var totalBytes: Int64 = 0
              @Published var status: DownloadStatus = .waiting
              @Published var errorMessage: String?
              var task: URLSessionDataTask?
              var resumeData: Data?
              var destinationURL: URL?
          
              init(appName: String, appIconURL: String, downloadURL: URL, appItem: AppItem? = nil) {
                  self.appName = appName; self.appIconURL = appIconURL
                  self.downloadURL = downloadURL; self.appItem = appItem
              }
          
              var progressPercentage: Int { Int(progress * 100) }
              var formattedDownloadedSize: String { ByteCountFormatter.string(fromByteCount: downloadedBytes, countStyle: .file) }
              var formattedTotalSize: String      { ByteCountFormatter.string(fromByteCount: totalBytes,      countStyle: .file) }
          }
          
          // MARK: - Install Method
          enum InstallMethod { case ota; case direct; case local }
          VIPEOF
          echo "Models.swift: $(wc -l < Models.swift) lines"

      - name: Generate Source - VIPZipHelper.swift
        run: |
          cat > VIPZipHelper.swift << 'VIPEOF'
          import Foundation
          import Compression
          
          // MARK: - ZIP Utilities (Pure Swift)
          private let kLocalFileSig:    UInt32 = 0x04034b50
          private let kCentralDirSig:   UInt32 = 0x02014b50
          private let kEndOfCentralSig: UInt32 = 0x06054b50
          
          private extension Data {
              func readU16(at off: Int) -> UInt16 {
                  guard off + 2 <= count else { return 0 }
                  return subdata(in: off..<off+2).withUnsafeBytes { $0.load(as: UInt16.self).littleEndian }
              }
              func readU32(at off: Int) -> UInt32 {
                  guard off + 4 <= count else { return 0 }
                  return subdata(in: off..<off+4).withUnsafeBytes { $0.load(as: UInt32.self).littleEndian }
              }
          }
          
          private func le16(_ v: UInt16) -> Data { var x = v.littleEndian; return Data(bytes: &x, count: 2) }
          private func le32(_ v: UInt32) -> Data { var x = v.littleEndian; return Data(bytes: &x, count: 4) }
          
          private func crc32ofData(_ data: Data) -> UInt32 {
              var crc: UInt32 = 0xffffffff
              for byte in data {
                  crc ^= UInt32(byte)
                  for _ in 0..<8 { crc = (crc & 1) == 1 ? (crc >> 1) ^ 0xedb88320 : crc >> 1 }
              }
              return crc ^ 0xffffffff
          }
          
          // MARK: - VIPZipReader
          final class VIPZipReader {
              private let data: Data
              init?(url: URL) {
                  guard let d = try? Data(contentsOf: url) else { return nil }
                  self.data = d
              }
              func extractAll(to destination: URL) throws {
                  let fm = FileManager.default
                  try fm.createDirectory(at: destination, withIntermediateDirectories: true)
                  var offset = 0
                  while offset + 30 <= data.count {
                      guard data.readU32(at: offset) == kLocalFileSig else { offset += 1; continue }
                      let method     = Int(data.readU16(at: offset + 8))
                      let compSize   = Int(data.readU32(at: offset + 18))
                      let uncompSize = Int(data.readU32(at: offset + 22))
                      let nameLen    = Int(data.readU16(at: offset + 26))
                      let extraLen   = Int(data.readU16(at: offset + 28))
                      guard offset + 30 + nameLen <= data.count else { break }
                      let name = String(data: data[offset+30..<offset+30+nameLen], encoding: .utf8) ?? ""
                      let dataStart = offset + 30 + nameLen + extraLen
                      guard dataStart + compSize <= data.count else { break }
                      if !name.isEmpty && !name.hasSuffix("/") {
                          let dest = destination.appendingPathComponent(name)
                          try fm.createDirectory(at: dest.deletingLastPathComponent(),
                                                 withIntermediateDirectories: true)
                          let raw = Data(data[dataStart..<dataStart + compSize])
                          let out: Data
                          if method == 0 { out = raw }
                          else if method == 8 { out = try inflate(raw, expected: uncompSize) }
                          else { throw NSError(domain: "VIPZipReader", code: method) }
                          try out.write(to: dest)
                      }
                      offset = dataStart + compSize
                  }
              }
              private func inflate(_ src: Data, expected: Int) throws -> Data {
                  let cap = max(expected, src.count * 6, 4096)
                  var dst = Data(count: cap)
                  let n = src.withUnsafeBytes { s -> Int in dst.withUnsafeMutableBytes { d -> Int in
                      compression_decode_buffer(
                          d.baseAddress!.assumingMemoryBound(to: UInt8.self), cap,
                          s.baseAddress!.assumingMemoryBound(to: UInt8.self), s.count,
                          nil, COMPRESSION_ZLIB)
                  } }
                  guard n > 0 else { throw NSError(domain: "VIPZipReader", code: -2) }
                  return dst.prefix(n)
              }
          }
          
          // MARK: - VIPZipWriter
          final class VIPZipWriter {
              static func createZip(from directory: URL) throws -> Data {
                  let fm = FileManager.default
                  guard let enumerator = fm.enumerator(
                      at: directory, includingPropertiesForKeys: [.isDirectoryKey],
                      options: [.skipsHiddenFiles]) else {
                      throw NSError(domain: "VIPZipWriter", code: -1)
                  }
                  var localData = Data(); var centralData = Data(); var count: UInt16 = 0
                  for case let url as URL in enumerator {
                      let isDir = (try? url.resourceValues(forKeys: [.isDirectoryKey]))?.isDirectory ?? false
                      var rel = String(url.path.dropFirst(directory.path.count))
                      if rel.hasPrefix("/") { rel = String(rel.dropFirst()) }
                      guard !rel.isEmpty else { continue }
                      let entryName = isDir ? rel + "/" : rel
                      let nameData  = entryName.data(using: .utf8) ?? Data()
                      let fileData  = isDir ? Data() : ((try? Data(contentsOf: url)) ?? Data())
                      let crc = crc32ofData(fileData); let sz = UInt32(fileData.count)
                      let localOff = UInt32(localData.count)
                      var lhdr = Data()
                      lhdr += le32(kLocalFileSig)
                      lhdr += le16(20); lhdr += le16(0); lhdr += le16(0)
                      lhdr += le16(0);  lhdr += le16(0)
                      lhdr += le32(crc); lhdr += le32(sz); lhdr += le32(sz)
                      lhdr += le16(UInt16(nameData.count)); lhdr += le16(0)
                      lhdr += nameData; lhdr += fileData
                      localData += lhdr
                      var cd = Data()
                      cd += le32(kCentralDirSig)
                      cd += le16(20); cd += le16(20); cd += le16(0); cd += le16(0)
                      cd += le16(0);  cd += le16(0)
                      cd += le32(crc); cd += le32(sz); cd += le32(sz)
                      cd += le16(UInt16(nameData.count))
                      cd += le16(0); cd += le16(0); cd += le16(0)
                      cd += le16(0); cd += le32(0); cd += le32(localOff)
                      cd += nameData
                      centralData += cd; count += 1
                  }
                  var eocd = Data()
                  eocd += le32(kEndOfCentralSig)
                  eocd += le16(0); eocd += le16(0)
                  eocd += le16(count); eocd += le16(count)
                  eocd += le32(UInt32(centralData.count))
                  eocd += le32(UInt32(localData.count))
                  eocd += le16(0)
                  return localData + centralData + eocd
              }
          }
          VIPEOF
          echo "VIPZipHelper.swift: $(wc -l < VIPZipHelper.swift) lines"

      - name: Generate Source - SigningEngine.swift
        run: |
          cat > SigningEngine.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - Signing Error
          enum SigningError: LocalizedError {
              case appBundleNotFound
              case p12ImportFailed(String)
              case signingFailed(Int32)
              case repackFailed(Error)
              case extractionFailed
              case cmsSignatureFailed(String)
          
              var errorDescription: String? {
                  switch self {
                  case .appBundleNotFound:          return "❌ لم يُعثر على .app bundle داخل IPA"
                  case .p12ImportFailed(let m):     return "❌ فشل استيراد P12: \(m)"
                  case .signingFailed(let c):       return "❌ فشل التوقيع — كود: \(c)"
                  case .repackFailed(let e):        return "❌ فشل إعادة الضغط: \(e.localizedDescription)"
                  case .extractionFailed:           return "❌ فشل فك ضغط IPA — تأكد من صحة الملف"
                  case .cmsSignatureFailed(let m):  return "❌ فشل توقيع CMS: \(m)"
                  }
              }
          }
          
          // MARK: - Signing Engine
          class SigningEngine {
              static let shared = SigningEngine()
              private let fm = FileManager.default
          
              func sign(
                  ipaURL: URL,
                  certificate: CertificateInfoModel,
                  progressHandler: @escaping (Double, String) -> Void,
                  completion: @escaping (Result<URL, Error>) -> Void
              ) {
                  DispatchQueue.global(qos: .userInitiated).async {
                      do {
                          let out = try self._sign(ipaURL: ipaURL, cert: certificate, progress: progressHandler)
                          DispatchQueue.main.async { completion(.success(out)) }
                      } catch {
                          DispatchQueue.main.async { completion(.failure(error)) }
                      }
                  }
              }
          
              private func _sign(
                  ipaURL: URL,
                  cert: CertificateInfoModel,
                  progress: @escaping (Double, String) -> Void
              ) throws -> URL {
                  progress(0.05, "📦 فك ضغط IPA...")
                  let tmp = fm.temporaryDirectory.appendingPathComponent("sign_\(UUID().uuidString)")
                  try fm.createDirectory(at: tmp, withIntermediateDirectories: true)
                  defer { try? fm.removeItem(at: tmp) }
          
                  let extractDir = tmp.appendingPathComponent("extracted")
                  try fm.createDirectory(at: extractDir, withIntermediateDirectories: true)
                  guard let reader = try? VIPZipReader(url: ipaURL) else { throw SigningError.extractionFailed }
                  try reader.extractAll(to: extractDir)
          
                  progress(0.20, "🔍 تحديد .app bundle...")
                  let payload = extractDir.appendingPathComponent("Payload")
                  guard fm.fileExists(atPath: payload.path),
                        let appBundle = (try? fm.contentsOfDirectory(
                          at: payload, includingPropertiesForKeys: nil
                        ))?.first(where: { $0.pathExtension == "app" })
                  else { throw SigningError.appBundleNotFound }
          
                  progress(0.24, "🧹 تنظيف التوقيع القديم...")
                  let oldCS = appBundle.appendingPathComponent("_CodeSignature")
                  if fm.fileExists(atPath: oldCS.path) { try? fm.removeItem(at: oldCS) }
                  let oldProv = appBundle.appendingPathComponent("embedded.mobileprovision")
                  if fm.fileExists(atPath: oldProv.path) { try? fm.removeItem(at: oldProv) }
          
                  progress(0.28, "📋 حقن mobileprovision الجديد...")
                  let provDest = appBundle.appendingPathComponent("embedded.mobileprovision")
                  try cert.mobileProvisionData.write(to: provDest, options: .atomicWrite)
          
                  progress(0.35, "📄 استخراج Entitlements...")
                  let entData = parseEntitlements(from: cert.mobileProvisionData)
          
                  progress(0.42, "🔑 استيراد P12...")
                  let identity = try importP12Identity(p12Data: cert.p12Data, password: cert.password)
          
                  let binaries = collectMachO(in: appBundle)
                  let bundleID = readBundleID(from: appBundle) ?? cert.displayName
                  let infoPlistData = try? Data(contentsOf: appBundle.appendingPathComponent("Info.plist"))
                  progress(0.50, "✍️ توقيع \(binaries.count) ملف ثنائي...")
          
                  let lock = NSLock()
                  var signError: Error?
                  var completed = 0
                  let total = max(binaries.count, 1)
                  DispatchQueue.concurrentPerform(iterations: binaries.count) { i in
                      if signError != nil { return }
                      let bin = binaries[i]
                      do {
                          try self.signMachOFile(at: bin, identity: identity,
                                                 entitlements: entData, bundleID: bundleID,
                                                 infoPlist: infoPlistData)
                      } catch {
                          lock.lock(); if signError == nil { signError = error }; lock.unlock()
                      }
                      lock.lock()
                      completed += 1
                      let pct = 0.50 + 0.30 * Double(completed) / Double(total)
                      let name = bin.lastPathComponent
                      lock.unlock()
                      DispatchQueue.main.async { progress(pct, "✍️ \(name) (\(completed)/\(total))") }
                  }
                  if let err = signError { throw err }
          
                  progress(0.85, "🗜 إعادة ضغط IPA...")
                  let outDir = fm.urls(for: .documentDirectory, in: .userDomainMask)[0]
                      .appendingPathComponent("Signed")
                  try? fm.createDirectory(at: outDir, withIntermediateDirectories: true)
                  let base   = ipaURL.deletingPathExtension().lastPathComponent
                  let outURL = outDir.appendingPathComponent("\(base)_signed.ipa")
                  if fm.fileExists(atPath: outURL.path) { try fm.removeItem(at: outURL) }
          
                  guard let zipData = try? VIPZipWriter.createZip(from: extractDir) else {
                      throw SigningError.repackFailed(
                          NSError(domain: "ZipCreate", code: -1,
                                  userInfo: [NSLocalizedDescriptionKey: "فشل إنشاء IPA الموقَّع"]))
                  }
                  try zipData.write(to: outURL, options: Data.WritingOptions.atomic)
                  progress(1.0, "✅ اكتمل التوقيع!")
                  return outURL
              }
          
              private func importP12Identity(p12Data: Data, password: String) throws -> SecIdentity {
                  for pwd in [password, password.trimmingCharacters(in: .whitespaces), ""] {
                      let opts = [kSecImportExportPassphrase as String: pwd]
                      var items: CFArray?
                      guard SecPKCS12Import(p12Data as CFData, opts as CFDictionary, &items) == errSecSuccess,
                            let arr = items as? [[String: Any]],
                            let first = arr.first,
                            let rawID = first[kSecImportItemIdentity as String]
                      else { continue }
                      let id = rawID as! SecIdentity
                      return id
                  }
                  throw SigningError.p12ImportFailed("تحقق من كلمة مرور P12")
              }
          
              private func signMachOFile(
                  at url: URL, identity: SecIdentity,
                  entitlements: Data?, bundleID: String, infoPlist: Data? = nil
              ) throws {
                  var data = try Data(contentsOf: url)
                  guard data.count >= 4 else { return }
                  let magic = readU32(data, at: 0)
                  if magic == 0xCAFEBABE || magic == 0xBEBAFECA {
                      try signFATBinary(data: &data, identity: identity,
                                        entitlements: entitlements, bundleID: bundleID,
                                        infoPlist: infoPlist)
                  } else if magic == 0xFEEDFACE || magic == 0xCEFAEDFE ||
                            magic == 0xFEEDFACF || magic == 0xCFFAEDFE {
                      try signSlice(data: &data, at: 0, identity: identity,
                                    entitlements: entitlements, bundleID: bundleID,
                                    infoPlist: infoPlist)
                  }
                  let perms = (try? fm.attributesOfItem(atPath: url.path)[.posixPermissions] as? Int) ?? 0o755
                  try data.write(to: url, options: .atomic)
                  try? fm.setAttributes([.posixPermissions: perms], ofItemAtPath: url.path)
              }
          
              private func signFATBinary(
                  data: inout Data, identity: SecIdentity,
                  entitlements: Data?, bundleID: String, infoPlist: Data? = nil
              ) throws {
                  let swapped = readU32(data, at: 0) == 0xBEBAFECA
                  func r32(_ o: Int) -> UInt32 {
                      let v = readU32(data, at: o)
                      return swapped ? v.bigEndian : v
                  }
                  let nArch = Int(r32(4))
                  for i in 0..<nArch {
                      let base   = 8 + i * 20
                      let offset = Int(r32(base + 8))
                      let size   = Int(r32(base + 12))
                      guard offset >= 0, size > 0, offset + size <= data.count else { continue }
                      var slice  = data.subdata(in: offset..<(offset + size))
                      try signSlice(data: &slice, at: 0, identity: identity,
                                    entitlements: entitlements, bundleID: bundleID,
                                    infoPlist: infoPlist)
                      data.replaceSubrange(offset..<(offset + size), with: slice)
                  }
              }
          
              private func signSlice(
                  data: inout Data, at sliceOffset: Int,
                  identity: SecIdentity, entitlements: Data?, bundleID: String,
                  infoPlist: Data? = nil
              ) throws {
                  let is64    = isMachO64(data: data, offset: sliceOffset)
                  let isSwap  = isBigEndian(data: data, offset: sliceOffset)
                  let hdrSize = is64 ? 32 : 28
          
                  func r32(_ o: Int) -> UInt32 {
                      let v = readU32(data, at: sliceOffset + o)
                      return isSwap ? v.byteSwapped : v
                  }
                  func r64(_ o: Int) -> UInt64 {
                      let v = readU64(data, at: sliceOffset + o)
                      return isSwap ? v.byteSwapped : v
                  }
                  func w32(_ value: UInt32, atAbs o: Int) {
                      guard o >= 0, o + 4 <= data.count else { return }
                      let v = (isSwap ? value.byteSwapped : value).littleEndian
                      withUnsafeBytes(of: v) { b in data.replaceSubrange(o..<(o + 4), with: b) }
                  }
                  func w64(_ value: UInt64, atAbs o: Int) {
                      guard o >= 0, o + 8 <= data.count else { return }
                      let v = (isSwap ? value.byteSwapped : value).littleEndian
                      withUnsafeBytes(of: v) { b in data.replaceSubrange(o..<(o + 8), with: b) }
                  }
          
                  let ncmds = Int(r32(16))
                  guard ncmds > 0, ncmds <= 512 else { return }
                  var off   = hdrSize
                  var csLCOff: Int?
                  var csDataOff: Int?
                  var csDataLen: Int?
                  var linkeditLCOff: Int?
                  var linkeditFileOff: UInt64 = 0
          
                  for _ in 0..<ncmds {
                      let cmd = r32(off)
                      let sz  = Int(r32(off + 4))
                      guard sz >= 8, off + sz <= data.count - sliceOffset else { break }
                      if cmd == 0x1D {
                          csLCOff   = off
                          csDataOff = Int(r32(off + 8))
                          csDataLen = Int(r32(off + 12))
                      } else if cmd == 0x19 {
                          let nameOff = sliceOffset + off + 8
                          if segName(data, at: nameOff) == "__LINKEDIT" {
                              linkeditLCOff   = off
                              linkeditFileOff = r64(off + 40)
                          }
                      } else if cmd == 0x01 {
                          let nameOff = sliceOffset + off + 8
                          if segName(data, at: nameOff) == "__LINKEDIT" {
                              linkeditLCOff   = off
                              linkeditFileOff = UInt64(r32(off + 32))
                          }
                      }
                      off += sz
                  }
          
                  let codeLimit = csDataOff ?? (data.count - sliceOffset)
                  guard codeLimit > 0 else { return }
          
                  let newSig = try buildCodeSignature(
                      data: data, sliceOffset: sliceOffset, codeLimit: codeLimit,
                      identity: identity, entitlements: entitlements, bundleID: bundleID,
                      infoPlist: infoPlist)
          
                  var finalSigFileOff = 0
                  var finalSigLen     = 0
          
                  if let lcOff = csLCOff, let csOff = csDataOff, let csLen = csDataLen {
                      let absStart = sliceOffset + csOff
                      let absEnd   = sliceOffset + csOff + csLen
                      guard absStart >= 0,
                            absStart < data.count,
                            absEnd   <= data.count,
                            absStart <= absEnd
                      else {
                          let tailOff = data.count - sliceOffset
                          data.append(newSig)
                          var lc = Data(count: 16)
                          lc.withUnsafeMutableBytes { ptr in
                              ptr.storeBytes(of: UInt32(0x1D).littleEndian,         toByteOffset: 0,  as: UInt32.self)
                              ptr.storeBytes(of: UInt32(16).littleEndian,           toByteOffset: 4,  as: UInt32.self)
                              ptr.storeBytes(of: UInt32(tailOff).littleEndian,      toByteOffset: 8,  as: UInt32.self)
                              ptr.storeBytes(of: UInt32(newSig.count).littleEndian, toByteOffset: 12, as: UInt32.self)
                          }
                          data.insert(contentsOf: lc, at: sliceOffset + hdrSize)
                          let nc  = (r32(16) + 1).littleEndian
                          let szc = (r32(20) + 16).littleEndian
                          withUnsafeBytes(of: nc)  { b in data.replaceSubrange((sliceOffset+16)..<(sliceOffset+20), with: b) }
                          withUnsafeBytes(of: szc) { b in data.replaceSubrange((sliceOffset+20)..<(sliceOffset+24), with: b) }
                          finalSigFileOff = tailOff
                          finalSigLen     = newSig.count
                          updateLinkedit(linkeditLCOff: linkeditLCOff, is64: is64,
                                         linkeditFileOff: linkeditFileOff, sliceOffset: sliceOffset,
                                         sigFileOff: finalSigFileOff, sigLen: finalSigLen,
                                         w32: w32, w64: w64)
                          return
                      }
                      let newSig2 = newSig.count <= csLen
                          ? newSig + Data(repeating: 0, count: csLen - newSig.count)
                          : newSig
                      data.replaceSubrange(absStart..<absEnd, with: newSig2)
                      w32(UInt32(newSig2.count), atAbs: sliceOffset + lcOff + 12)
                      finalSigFileOff = csOff
                      finalSigLen     = newSig2.count
                  } else {
                      let sigOff = data.count - sliceOffset
                      data.append(newSig)
                      var lc = Data(count: 16)
                      lc.withUnsafeMutableBytes { ptr in
                          ptr.storeBytes(of: UInt32(0x1D).littleEndian,         toByteOffset: 0,  as: UInt32.self)
                          ptr.storeBytes(of: UInt32(16).littleEndian,           toByteOffset: 4,  as: UInt32.self)
                          ptr.storeBytes(of: UInt32(sigOff).littleEndian,       toByteOffset: 8,  as: UInt32.self)
                          ptr.storeBytes(of: UInt32(newSig.count).littleEndian, toByteOffset: 12, as: UInt32.self)
                      }
                      data.insert(contentsOf: lc, at: sliceOffset + hdrSize)
                      let nc  = (r32(16) + 1).littleEndian
                      let szc = (r32(20) + 16).littleEndian
                      withUnsafeBytes(of: nc)  { b in data.replaceSubrange((sliceOffset+16)..<(sliceOffset+20), with: b) }
                      withUnsafeBytes(of: szc) { b in data.replaceSubrange((sliceOffset+20)..<(sliceOffset+24), with: b) }
                      finalSigFileOff = sigOff
                      finalSigLen     = newSig.count
                  }
          
                  updateLinkedit(linkeditLCOff: linkeditLCOff, is64: is64,
                                 linkeditFileOff: linkeditFileOff, sliceOffset: sliceOffset,
                                 sigFileOff: finalSigFileOff, sigLen: finalSigLen,
                                 w32: w32, w64: w64)
              }
          
              private func updateLinkedit(
                  linkeditLCOff: Int?, is64: Bool, linkeditFileOff: UInt64, sliceOffset: Int,
                  sigFileOff: Int, sigLen: Int,
                  w32: (UInt32, Int) -> Void, w64: (UInt64, Int) -> Void
              ) {
                  guard let lcOff = linkeditLCOff, sigLen > 0 else { return }
                  let sigEnd = UInt64(sigFileOff + sigLen)
                  guard sigEnd > linkeditFileOff else { return }
                  let newFileSize = sigEnd - linkeditFileOff
                  let pageMask: UInt64 = 0x3FFF
                  let newVMSize = (newFileSize + pageMask) & ~pageMask
                  let abs = sliceOffset + lcOff
                  if is64 {
                      w64(newVMSize,  abs + 32)
                      w64(newFileSize, abs + 48)
                  } else {
                      w32(UInt32(truncatingIfNeeded: newVMSize),  abs + 28)
                      w32(UInt32(truncatingIfNeeded: newFileSize), abs + 36)
                  }
              }
          
              private func segName(_ data: Data, at absOff: Int) -> String {
                  guard absOff >= 0, absOff + 16 <= data.count else { return "" }
                  let bytes = data.subdata(in: absOff..<(absOff + 16))
                  let trimmed = bytes.prefix { $0 != 0 }
                  return String(decoding: trimmed, as: UTF8.self)
              }
          
              private func buildCodeSignature(
                  data: Data, sliceOffset: Int, codeLimit: Int,
                  identity: SecIdentity, entitlements: Data?, bundleID: String,
                  infoPlist: Data? = nil
              ) throws -> Data {
                  let pageSize = 4096
                  let numPages = max(0, (codeLimit + pageSize - 1) / pageSize)
                  let hashSize = 32
          
                  var reqBlob = Data(count: 12)
                  reqBlob.withUnsafeMutableBytes { ptr in
                      ptr.storeBytes(of: UInt32(0xFADE0C01).bigEndian, toByteOffset: 0, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(12).bigEndian,         toByteOffset: 4, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0).bigEndian,          toByteOffset: 8, as: UInt32.self)
                  }
          
                  var entBlob: Data?
                  if let ents = entitlements {
                      var eb = Data(count: 8)
                      eb.withUnsafeMutableBytes { ptr in
                          ptr.storeBytes(of: UInt32(0xFADE7171).bigEndian,     toByteOffset: 0, as: UInt32.self)
                          ptr.storeBytes(of: UInt32(8 + ents.count).bigEndian, toByteOffset: 4, as: UInt32.self)
                      }
                      eb.append(ents)
                      entBlob = eb
                  }
          
                  let nSpecial  = 5
                  let idBytes   = (bundleID + "\0").data(using: .utf8) ?? Data([0])
                  let cdFixed   = 88
                  let identOff  = UInt32(cdFixed)
                  let hashOff   = UInt32(cdFixed + idBytes.count + nSpecial * hashSize)
                  let cdLen     = Int(hashOff) + numPages * hashSize
          
                  var cd = Data(count: cdLen)
                  cd.withUnsafeMutableBytes { ptr in
                      ptr.storeBytes(of: UInt32(0xFADE0C02).bigEndian,  toByteOffset: 0,  as: UInt32.self)
                      ptr.storeBytes(of: UInt32(cdLen).bigEndian,       toByteOffset: 4,  as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0x20400).bigEndian,     toByteOffset: 8,  as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0).bigEndian,           toByteOffset: 12, as: UInt32.self)
                      ptr.storeBytes(of: hashOff.bigEndian,             toByteOffset: 16, as: UInt32.self)
                      ptr.storeBytes(of: identOff.bigEndian,            toByteOffset: 20, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(nSpecial).bigEndian,    toByteOffset: 24, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(numPages).bigEndian,    toByteOffset: 28, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(codeLimit).bigEndian,   toByteOffset: 32, as: UInt32.self)
                      ptr[36] = UInt8(hashSize)
                      ptr[37] = 2
                      ptr[38] = 0
                      ptr[39] = 12
                      ptr.storeBytes(of: UInt32(0).bigEndian,           toByteOffset: 40, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0).bigEndian,           toByteOffset: 44, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0).bigEndian,           toByteOffset: 48, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(0).bigEndian,           toByteOffset: 52, as: UInt32.self)
                      ptr.storeBytes(of: UInt64(codeLimit).bigEndian,   toByteOffset: 56, as: UInt64.self)
                      ptr.storeBytes(of: UInt64(4096).bigEndian,        toByteOffset: 64, as: UInt64.self)
                      ptr.storeBytes(of: UInt64(codeLimit).bigEndian,   toByteOffset: 72, as: UInt64.self)
                      ptr.storeBytes(of: UInt64(0).bigEndian,           toByteOffset: 80, as: UInt64.self)
                  }
          
                  let idStart = Int(identOff)
                  cd.replaceSubrange(idStart..<(idStart + idBytes.count), with: idBytes)
          
                  let hBase = Int(hashOff)
          
                  if let eb = entBlob {
                      let pos = hBase - 5 * hashSize
                      cd.replaceSubrange(pos..<(pos + hashSize), with: sha256(eb))
                  }
          
                  let req2Pos = hBase - 2 * hashSize
                  cd.replaceSubrange(req2Pos..<(req2Pos + hashSize), with: sha256(reqBlob))
          
                  if let ip = infoPlist {
                      let ip1Pos = hBase - 1 * hashSize
                      cd.replaceSubrange(ip1Pos..<(ip1Pos + hashSize), with: sha256(ip))
                  }
          
                  if numPages > 0 {
                      var pageHashes = [Data](repeating: Data(), count: numPages)
                      pageHashes.withUnsafeMutableBufferPointer { buf in
                          DispatchQueue.concurrentPerform(iterations: numPages) { page in
                              let start = sliceOffset + page * pageSize
                              guard start < data.count else { return }
                              let end     = min(start + pageSize, sliceOffset + codeLimit)
                              let safeEnd = min(end, data.count)
                              guard safeEnd > start else { return }
                              buf[page] = self.sha256(data.subdata(in: start..<safeEnd))
                          }
                      }
                      for page in 0..<numPages where pageHashes[page].count == hashSize {
                          let slotPos = hBase + page * hashSize
                          cd.replaceSubrange(slotPos..<(slotPos + hashSize), with: pageHashes[page])
                      }
                  }
          
                  let cmsSig = try buildCMSSignature(codeDirectory: cd, identity: identity)
                  var cmsBlob = Data(count: 8)
                  cmsBlob.withUnsafeMutableBytes { ptr in
                      ptr.storeBytes(of: UInt32(0xFADE0B01).bigEndian,            toByteOffset: 0, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(8 + cmsSig.count).bigEndian,      toByteOffset: 4, as: UInt32.self)
                  }
                  cmsBlob.append(cmsSig)
          
                  var blobs: [(UInt32, Data)] = [(0x00000000, cd), (0x00000002, reqBlob)]
                  if let eb = entBlob { blobs.append((0x00000005, eb)) }
                  blobs.append((0x00010000, cmsBlob))
          
                  let indexBytes  = blobs.count * 8
                  let headerBytes = 12 + indexBytes
                  var offsets: [UInt32] = []
                  var cur = UInt32(headerBytes)
                  for (_, b) in blobs { offsets.append(cur); cur += UInt32(b.count) }
          
                  var super_ = Data(count: headerBytes)
                  super_.withUnsafeMutableBytes { ptr in
                      ptr.storeBytes(of: UInt32(0xFADE0CC0).bigEndian,    toByteOffset: 0, as: UInt32.self)
                      ptr.storeBytes(of: cur.bigEndian,                    toByteOffset: 4, as: UInt32.self)
                      ptr.storeBytes(of: UInt32(blobs.count).bigEndian,   toByteOffset: 8, as: UInt32.self)
                      for (i, (type, _)) in blobs.enumerated() {
                          let base = 12 + i * 8
                          ptr.storeBytes(of: type.bigEndian,       toByteOffset: base,   as: UInt32.self)
                          ptr.storeBytes(of: offsets[i].bigEndian, toByteOffset: base+4, as: UInt32.self)
                      }
                  }
                  for (_, b) in blobs { super_.append(b) }
                  return super_
              }
          
              private func buildCMSSignature(codeDirectory: Data, identity: SecIdentity) throws -> Data {
                  var privateKey: SecKey?
                  guard SecIdentityCopyPrivateKey(identity, &privateKey) == errSecSuccess,
                        let key = privateKey else {
                      throw SigningError.cmsSignatureFailed("لا يمكن استخراج المفتاح الخاص")
                  }
                  let cdHash = sha256(codeDirectory)
          
                  var cfErr: Unmanaged<CFError>?
                  let keyAttrs  = SecKeyCopyAttributes(key) as? [String: Any]
                  let keyType   = keyAttrs?[kSecAttrKeyType as String] as? String ?? ""
                  let isEC      = keyType == (kSecAttrKeyTypeEC as String)
                               || keyType == (kSecAttrKeyTypeECSECPrimeRandom as String)
                  let algorithm: SecKeyAlgorithm = isEC
                      ? .ecdsaSignatureMessageX962SHA256
                      : .rsaSignatureMessagePKCS1v15SHA256
          
                  guard let sig = SecKeyCreateSignature(
                      key, algorithm, cdHash as CFData, &cfErr) as Data?
                  else {
                      throw SigningError.cmsSignatureFailed(
                          cfErr?.takeRetainedValue().localizedDescription ?? "sign failed")
                  }
          
                  var certData = Data()
                  var certRef: SecCertificate?
                  if SecIdentityCopyCertificate(identity, &certRef) == errSecSuccess, let c = certRef {
                      certData = SecCertificateCopyData(c) as Data
                  }
                  return buildMinimalCMSDER(signature: sig, certificate: certData)
              }
          
              private func buildMinimalCMSDER(signature: Data, certificate: Data) -> Data {
                  func derLen(_ n: Int) -> Data {
                      if n < 0x80 { return Data([UInt8(n)]) }
                      if n < 0x100 { return Data([0x81, UInt8(n)]) }
                      return Data([0x82, UInt8(n >> 8), UInt8(n & 0xFF)])
                  }
                  func tag(_ t: UInt8, _ d: Data) -> Data { Data([t]) + derLen(d.count) + d }
                  let seq  = { (d: Data) in tag(0x30, d) }
                  let set_ = { (d: Data) in tag(0x31, d) }
                  let oid  = { (b: [UInt8]) in tag(0x06, Data(b)) }
                  let int_ = { (v: UInt8) in Data([0x02, 0x01, v]) }
                  let ctx  = { (n: UInt8, d: Data) in tag(0xA0 | n, d) }
                  let oct  = { (d: Data) in tag(0x04, d) }
          
                  let sha256OID  = oid([0x60,0x86,0x48,0x01,0x65,0x03,0x04,0x02,0x01])
                  let rsaOID     = oid([0x2A,0x86,0x48,0x86,0xF7,0x0D,0x01,0x01,0x01])
                  let sdOID      = oid([0x2A,0x86,0x48,0x86,0xF7,0x0D,0x01,0x07,0x02])
                  let dataOID    = oid([0x2A,0x86,0x48,0x86,0xF7,0x0D,0x01,0x07,0x01])
          
                  let digestAlg  = seq(sha256OID + Data([0x05,0x00]))
                  let signerInfo = seq(int_(1) + Data([0xA2,0x00]) + digestAlg +
                                       seq(rsaOID + Data([0x05,0x00])) + oct(signature))
                  let certs      = certificate.isEmpty ? Data() : ctx(0, certificate)
                  let signedData = seq(int_(1) + set_(digestAlg) + seq(dataOID) + certs + set_(signerInfo))
                  return seq(sdOID + ctx(0, signedData))
              }
          
              private func sha256(_ data: Data) -> Data {
                  return Data(SHA256.hash(data: data))
              }
          
              private func readU32(_ d: Data, at o: Int) -> UInt32 {
                  d.withUnsafeBytes { ptr -> UInt32 in
                      guard let base = ptr.baseAddress, o + 4 <= ptr.count else { return 0 }
                      var v: UInt32 = 0; memcpy(&v, base.advanced(by: o), 4); return v
                  }
              }
              private func readU64(_ d: Data, at o: Int) -> UInt64 {
                  d.withUnsafeBytes { ptr -> UInt64 in
                      guard let base = ptr.baseAddress, o + 8 <= ptr.count else { return 0 }
                      var v: UInt64 = 0; memcpy(&v, base.advanced(by: o), 8); return v
                  }
              }
          
              private func isMachO64(data: Data, offset: Int) -> Bool {
                  let m = readU32(data, at: offset)
                  return m == 0xFEEDFACF || m == 0xCFFAEDFE
              }
              private func isBigEndian(data: Data, offset: Int) -> Bool {
                  let m = readU32(data, at: offset)
                  return m == 0xCEFAEDFE || m == 0xCFFAEDFE || m == 0xBEBAFECA
              }
              private func readBundleID(from appBundle: URL) -> String? {
                  let plist = appBundle.appendingPathComponent("Info.plist")
                  guard let d = try? Data(contentsOf: plist),
                        let dict = try? PropertyListSerialization.propertyList(
                          from: d, options: [], format: nil) as? [String: Any]
                  else { return nil }
                  return dict["CFBundleIdentifier"] as? String
              }
          
              private func parseEntitlements(from provData: Data) -> Data? {
                  let bytes    = [UInt8](provData)
                  let xmlStart = Array("<?xml".utf8)
                  let plistEnd = Array("</plist>".utf8)
                  guard let s = bytes.firstRange(of: xmlStart),
                        let e = bytes.firstRange(of: plistEnd)
                  else { return nil }
                  let xmlData = Data(bytes[s.lowerBound ..< e.upperBound])
                  guard let dict = (try? PropertyListSerialization.propertyList(
                                      from: xmlData, options: [], format: nil)) as? [String: Any],
                        let ents = dict["Entitlements"] as? [String: Any],
                        let out  = try? PropertyListSerialization.data(
                          fromPropertyList: ents, format: .xml, options: 0)
                  else { return nil }
                  return out
              }
          
              private func collectMachO(in dir: URL) -> [URL] {
                  var result: [URL] = []
                  guard let e = fm.enumerator(at: dir,
                      includingPropertiesForKeys: [.isRegularFileKey],
                      options: [.skipsHiddenFiles]) else { return [] }
                  for case let u as URL in e {
                      guard (try? u.resourceValues(forKeys: [.isRegularFileKey]))?.isRegularFile == true,
                            isMachOFile(at: u) else { continue }
                      result.append(u)
                  }
                  return result
              }
              private func isMachOFile(at url: URL) -> Bool {
                  guard let fh = try? FileHandle(forReadingFrom: url) else { return false }
                  let magic = fh.readData(ofLength: 4)
                  try? fh.close()
                  guard magic.count == 4 else { return false }
                  var m: UInt32 = 0
                  magic.withUnsafeBytes { ptr in
                      if let base = ptr.baseAddress { memcpy(&m, base, 4) }
                  }
                  return m == 0xFEEDFACE || m == 0xCEFAEDFE
                      || m == 0xFEEDFACF || m == 0xCFFAEDFE
                      || m == 0xBEBAFECA || m == 0xCAFEBABE
              }
          }
          
          // MARK: - Install Engine (OTA Only)
          enum VIP21InstallError: LocalizedError {
              case invalidIPA
              case installFailed(String)
              case unsupportedMethod
              var errorDescription: String? {
                  switch self {
                  case .invalidIPA:            return "ملف IPA غير صالح"
                  case .installFailed(let m):  return "فشل التثبيت: \(m)"
                  case .unsupportedMethod:     return "طريقة التثبيت غير مدعومة"
                  }
              }
          }
          
          final class VIP21InstallEngine {
              static let shared = VIP21InstallEngine()
              private init() {}
          
              func install(
                  ipaURL: URL, bundleID: String, appName: String, version: String,
                  progressHandler: @escaping (Double, String) -> Void,
                  completion: @escaping (Result<Void, Error>) -> Void
              ) {
                  DispatchQueue.global(qos: .userInitiated).async { [weak self] in
                      guard let self = self else { return }
                      guard FileManager.default.fileExists(atPath: ipaURL.path) else {
                          DispatchQueue.main.async { completion(.failure(VIP21InstallError.invalidIPA)) }
                          return
                      }
                      self.installViaOTA(ipaURL: ipaURL, bundleID: bundleID, appName: appName,
                          version: version, progressHandler: progressHandler, completion: completion)
                  }
              }
          
              private func installViaOTA(
                  ipaURL: URL, bundleID: String, appName: String, version: String,
                  progressHandler: @escaping (Double, String) -> Void,
                  completion: @escaping (Result<Void, Error>) -> Void
              ) {
                  let plist = [
                      "<?xml version=\"1.0\" encoding=\"UTF-8\"?>",
                      "<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">",
                      "<plist version=\"1.0\"><dict><key>items</key><array><dict>",
                      "<key>assets</key><array><dict><key>kind</key><string>software-package</string>",
                      "<key>url</key><string>\(ipaURL.absoluteString)</string></dict></array>",
                      "<key>metadata</key><dict><key>bundle-identifier</key><string>\(bundleID)</string>",
                      "<key>bundle-version</key><string>\(version)</string>",
                      "<key>kind</key><string>software</string><key>title</key><string>\(appName)</string>",
                      "</dict></dict></array></dict></plist>"
                  ].joined(separator: "\n")
                  let tmp = FileManager.default.temporaryDirectory
                      .appendingPathComponent("install_\(UUID().uuidString).plist")
                  guard (try? plist.write(to: tmp, atomically: true, encoding: .utf8)) != nil else {
                      DispatchQueue.main.async {
                          completion(.failure(VIP21InstallError.installFailed("فشل إنشاء plist")))
                      }; return
                  }
                  let enc = tmp.absoluteString.addingPercentEncoding(withAllowedCharacters: .urlQueryAllowed) ?? ""
                  guard let otaURL = URL(string: "itms-services://?action=download-manifest&url=\(enc)") else {
                      DispatchQueue.main.async {
                          completion(.failure(VIP21InstallError.installFailed("رابط OTA غير صالح")))
                      }; return
                  }
                  DispatchQueue.main.async {
                      progressHandler(0.5, "فتح مثبّت النظام...")
                      UIApplication.shared.open(otaURL) { ok in
                          if ok { progressHandler(1.0, "تم فتح نافذة التثبيت"); completion(.success(())) }
                          else { completion(.failure(VIP21InstallError.installFailed(
                              "تعذر فتح مثبت النظام")))
                          }
                      }
                  }
              }
          }
          VIPEOF
          echo "SigningEngine.swift: $(wc -l < SigningEngine.swift) lines"

