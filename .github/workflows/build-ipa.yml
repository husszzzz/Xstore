                      .cornerRadius(14)
                      .shadow(color: (isDisabled ? Color.gray : gradient.first ?? .blue).opacity(0.3),
                              radius: pressed ? 3 : 8, x: 0, y: pressed ? 1 : 4)
                      .scaleEffect(pressed ? 0.97 : 1.0)
                  }
                  .disabled(isDisabled || isLoading)
                  .buttonStyle(PlainButtonStyle())
                  .simultaneousGesture(
                      DragGesture(minimumDistance: 0)
                          .onChanged { _ in withAnimation(.easeInOut(duration: 0.1)) { pressed = true } }
                          .onEnded   { _ in withAnimation(.spring(response: 0.3)) { pressed = false } }
                  )
              }
          }
          
          // MARK: - Crown Badge
          struct CrownBadge: View {
              @State private var pulse = false
              var body: some View {
