          struct AppCategory: Identifiable {
              let id = UUID()
              let name: String; let icon: String; let gradient: [Color]
          }
          
          extension Array where Element: Equatable {
              func firstRange(of needle: [Element]) -> Range<Int>? {
                  guard !needle.isEmpty, needle.count <= count else { return nil }
                  for startIdx in 0...(count - needle.count) {
                      if self[startIdx..<startIdx + needle.count].elementsEqual(needle) {
                          return startIdx..<startIdx + needle.count
                      }
                  }
                  return nil
              }
          }
          
          struct CertificateInfoModel: Identifiable, Codable {
              var id = UUID()
              let name: String
              let p12DataString: String
              let mobileProvisionDataString: String
              let password: String
              let displayName: String
              let creationDate: Date
              let expiryDate: Date?
              let certificateName: String?
              var teamID: String?
          
              var isValid: Bool {
                  guard let expiry = expiryDate else { return true }
                  return expiry > Date()
              }
          
              var daysRemaining: Int? {
                  guard let expiry = expiryDate else { return nil }
                  return Calendar.current.dateComponents([.day], from: Date(), to: expiry).day
              }
          
              var expiryStatusColor: Color {
                  guard let d = daysRemaining else { return .gray }
                  if d < 0  { return .red }
                  if d < 7  { return .orange }
                  if d < 30 { return Color(red: 1.0, green: 0.6, blue: 0.0) }
                  return .green
              }
          
              var expiryText: String {
                  guard let d = daysRemaining else { return "غير معروف" }
                  if d < 0  { return "منتهية منذ \(abs(d)) يوم" }
                  if d == 0 { return "تنتهي اليوم!" }
                  return "متبقي \(d) يوم"
              }
          
              var healthScore: Int {
                  guard let d = daysRemaining else { return 50 }
                  if d < 0  { return 0 }
                  if d < 7  { return 25 }
                  if d < 30 { return 60 }
                  return 100
              }
          
              var p12Data: Data { Data(base64Encoded: p12DataString) ?? Data() }
              var mobileProvisionData: Data { Data(base64Encoded: mobileProvisionDataString) ?? Data() }
          
              init(id: UUID = UUID(), name: String, p12Data: Data, mobileProvisionData: Data,
                   password: String, displayName: String, creationDate: Date) {
                  self.id = id
                  self.name = name
                  self.p12DataString = p12Data.base64EncodedString()
                  self.mobileProvisionDataString = mobileProvisionData.base64EncodedString()
                  self.password = password
                  self.displayName = displayName
                  self.creationDate = creationDate
                  self.expiryDate = Self.extractExpiryDate(from: mobileProvisionData)
                  let (certName, tid) = Self.extractCertInfo(from: p12Data, password: password)
                  self.certificateName = certName
                  self.teamID = tid
              }
          
              private static func extractExpiryDate(from data: Data) -> Date? {
                  let bytes = [UInt8](data)
                  let xmlMarker = Array("<?xml".utf8)
                  let plistEnd  = Array("</plist>".utf8)
                  if let startIdx = bytes.firstRange(of: xmlMarker),
                     let endRange  = bytes.firstRange(of: plistEnd) {
                      let xmlData = Data(bytes[startIdx.lowerBound..<endRange.upperBound])
                      if let dict = try? PropertyListSerialization.propertyList(
                          from: xmlData, options: [], format: nil) as? [String: Any],
                         let expiry = dict["ExpirationDate"] as? Date {
                          return expiry
                      }
                  }
                  let rawStr = String(data: data, encoding: .ascii) ?? String(data: data, encoding: .utf8) ?? ""
                  let pattern = "ExpirationDate</key>\\s*<date>(.*?)</date>"
                  if let regex  = try? NSRegularExpression(pattern: pattern, options: .dotMatchesLineSeparators),
                     let match  = regex.firstMatch(in: rawStr, range: NSRange(rawStr.startIndex..., in: rawStr)),
                     let range  = Range(match.range(at: 1), in: rawStr) {
                      return ISO8601DateFormatter().date(from: String(rawStr[range]))
                  }
                  return nil
              }
          
              private static func extractCertInfo(from data: Data, password: String) -> (String?, String?) {
                  let passwords = [password, password.trimmingCharacters(in: .whitespaces), ""]
                  for pwd in passwords {
                      let opts: [String: Any] = [kSecImportExportPassphrase as String: pwd]
                      var items: CFArray?
                      guard SecPKCS12Import(data as CFData, opts as CFDictionary, &items) == errSecSuccess,
                            let arr  = items as? [[String: Any]],
                            let first = arr.first,
                            let raw   = first[kSecImportItemIdentity as String],
                            CFGetTypeID(raw as CFTypeRef) == SecIdentityGetTypeID() else { continue }
                      let identity = raw as! SecIdentity
                      var cert: SecCertificate?
                      SecIdentityCopyCertificate(identity, &cert)
                      guard let c = cert else { continue }
                      let summary = SecCertificateCopySubjectSummary(c) as String? ?? ""
                      var teamID: String?
                      if let open  = summary.lastIndex(of: "("),
                         let close = summary.lastIndex(of: ")"),
                         open < close {
                          let t = String(summary[summary.index(after: open)..<close])
                          if t.count == 10 { teamID = t }
                      }
                      return (summary.isEmpty ? nil : summary, teamID)
                  }
                  return (nil, nil)
              }
          }
          
          enum DownloadStatus: String {
              case waiting = "في الانتظار"; case downloading = "جاري التحميل"
              case completed = "مكتمل"; case failed = "فشل"; case paused = "متوقف"
          }
          
          class ActiveDownload: ObservableObject, Identifiable {
