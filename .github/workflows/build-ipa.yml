                                     startPoint: .leading, endPoint: .trailing)
                  )
                  .clipShape(Capsule())
                  .shadow(color: .vipPurple.opacity(0.30), radius: 8, x: 0, y: 3)
                  .padding(.horizontal, 12)
                  .onTapGesture {
                      if let url = URL(string: AppConstants.telegramURL) { UIApplication.shared.open(url) }
                  }
              }
          }
          VIPEOF
