name: Build_21s_SwiftUI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          xcode-select -p
          swift --version

      - name: Setup Dependencies
        run: |
          brew install ldid zip
          # Download ZIP libraries from GitHub
          mkdir -p libs
          curl -L -o libs/ZIPFoundation.zip "https://github.com/weichsel/ZIPFoundation/archive/refs/heads/main.zip"
          unzip -q libs/ZIPFoundation.zip -d libs/
          # Download CryptoSwift for signing
          curl -L -o libs/CryptoSwift.zip "https://github.com/krzyzanowskim/CryptoSwift/archive/refs/heads/main.zip"
          unzip -q libs/CryptoSwift.zip -d libs/

      - name: Generate App Icons
        run: |
          mkdir -p Resources
          python3 -m pip install --quiet --break-system-packages Pillow
          python3 << 'PYIEOF'
          from PIL import Image, ImageDraw, ImageFont
          def make_icon(size, path):
              img  = Image.new("RGB", (size, size), (10, 11, 20))
              draw = ImageDraw.Draw(img)
              for y in range(size):
                  t = y/size
                  draw.line([(0,y),(size,y)], fill=(int(110*(1-t)+34*t), int(86*(1-t)+211*t), int(207*(1-t)+238*t)))
              draw.rounded_rectangle([size*.14,size*.30,size*.86,size*.80],
                  radius=size*.10, outline=(255,255,255), width=max(2,size//34))
              try:
                  font = ImageFont.truetype("/System/Library/Fonts/Supplemental/Arial Bold.ttf", int(size*.30))
              except Exception:
                  font = ImageFont.load_default()
              bbox = draw.textbbox((0,0),"21",font=font)
              tw,th = bbox[2]-bbox[0], bbox[3]-bbox[1]
              draw.text(((size-tw)/2-bbox[0],(size-th)/2-bbox[1]),"21",fill=(255,255,255),font=font)
              img.save(path)
          make_icon(120,  "Resources/AppIcon60x60@2x.png")
          make_icon(152,  "Resources/AppIcon76x76@2x~ipad.png")
          make_icon(1024, "Resources/AppIcon1024x1024.png")
          PYIEOF
          ls -lh Resources

      - name: Generate App Data
        run: |
          mkdir -p Resources
          cat > Resources/apps_data.json << 'JEOF'
          {
            "name": "21s Store",
            "identifier": "com.vip21.store",
            "sourceURL": "https://repository.apptesters.org/apps.json",
            "iconURL": "https://a.top4top.io/p_380487iqk0.jpeg",
            "website": "https://t.me/ClickStoreipaios",
            "subtitle": "متجر 21s VIP",
            "apps": []
          }
          JEOF
          python3 -c "import json; json.load(open('Resources/apps_data.json')); print('OK')"

