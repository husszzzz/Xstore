                              }
                              return mutable
                          }
                      }
                  }.resume()
              }
          
              static func inferCategory(name: String, desc: String) -> String {
                  let text = (name + " " + desc).lowercased()
                  let map: [(keys: [String], cat: String)] = [
                      (["game", "لعبة", "لعب", "clash", "minecraft", "roblox", "pubg", "cod", "fifa"], "ألعاب"),
                      (["social", "chat", "تواصل", "instagram", "tiktok", "telegram", "whatsapp", "snapchat", "twitter"], "اجتماعي"),
                      (["music", "موسيقى", "spotify", "soundcloud", "youtube", "video", "فيديو", "netflix", "tubi"], "ترفيه"),
                      (["vpn", "security", "أمان", "proxy", "shield", "protect"], "أمان"),
                      (["photo", "camera", "صورة", "تصوير", "edit", "تعديل", "lightroom", "vsco", "capcut"], "صور وفيديو"),
                      (["learn", "تعلّم", "education", "تعليم", "school", "duolingo", "quran", "قرآن"], "تعليم"),
                      (["shop", "store", "تسوق", "amazon", "noon", "delivery", "توصيل"], "تسوق"),
                      (["bank", "pay", "دفع", "مال", "finance", "بنك", "paypal", "stc pay"], "مالية"),
                      (["productivity", "office", "word", "excel", "pdf", "scan", "إنتاجية", "ملفات"], "إنتاجية"),
                      (["travel", "سفر", "flight", "hotel", "فندق", "map", "خرائط", "uber", "careem"], "سفر"),
                      (["health", "fitness", "صحة", "رياضة", "workout", "gym", "diet"], "صحة ورياضة"),
                      (["food", "restaurant", "طعام", "مطعم", "hungerstation", "talabat", "جاهز"], "طعام"),
                      (["news", "أخبار", "newspaper", "bbc", "cnn", "aljazeera"], "أخبار"),
                  ]
                  for entry in map {
                      if entry.keys.contains(where: { text.contains($0) }) { return entry.cat }
                  }
                  return "أدوات"
              }
          
              func retryFetch() { fetchApps() }
          
              func loadRecentSearches() {
                  recentSearches = UserDefaults.standard.stringArray(forKey: "recentSearches") ?? []
              }
          
              func addRecentSearch(_ term: String) {
                  guard !term.isEmpty else { return }
                  recentSearches.removeAll { $0 == term }
                  recentSearches.insert(term, at: 0)
                  if recentSearches.count > 15 { recentSearches = Array(recentSearches.prefix(10)) }
                  UserDefaults.standard.set(recentSearches, forKey: "recentSearches")
              }
          }
          
          class UserProfileManager: ObservableObject {
              @Published var profile: UserProfile = UserProfile.defaultProfile
          
              init() { loadProfile() }
          
              func loadProfile() {
                  if let data = UserDefaults.standard.data(forKey: "userProfile"),
                     let p = try? JSONDecoder().decode(UserProfile.self, from: data) {
                      profile = p
                  }
              }
          
              func saveProfile() {
                  if let data = try? JSONEncoder().encode(profile) {
                      UserDefaults.standard.set(data, forKey: "userProfile")
                  }
              }
          
              func updateProfileImage(_ image: UIImage?) {
                  profile.profileImageData = image?.jpegData(compressionQuality: 0.8)
                  saveProfile()
              }
          
              func updateSourcePlatform(_ platform: SourcePlatform) {
                  profile.sourcePlatform = platform.rawValue
                  saveProfile()
              }
          
              func completeOnboarding() {
                  profile.hasCompletedOnboarding = true
                  saveProfile()
              }
          }
