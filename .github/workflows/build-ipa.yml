      - name: Generate Source - HapticManager.swift
        run: |
          cat > HapticManager.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - Haptic Manager
          class HapticManager {
              static let shared = HapticManager()
              func impact(_ style: UIImpactFeedbackGenerator.FeedbackStyle = .medium) {
                  let g = UIImpactFeedbackGenerator(style: style); g.impactOccurred()
              }
              func notification(_ type: UINotificationFeedbackGenerator.FeedbackType) {
                  let g = UINotificationFeedbackGenerator(); g.notificationOccurred(type)
