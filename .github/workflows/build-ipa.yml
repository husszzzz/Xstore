        run: |
          cat > AppsTabView.swift << 'VIPEOF'
          import SwiftUI
          import UIKit
          import Foundation
          import Combine
          import Security
          import CryptoKit
          import PhotosUI
          import UserNotifications
          import CoreHaptics
          import Network
          import UniformTypeIdentifiers
          import LocalAuthentication
          
          // MARK: - Apps Tab
          struct AppsTabView: View {
              @ObservedObject var appsManager: AppsManager
              @ObservedObject var downloadManager: IPADownloadManager
              @State private var selectedApp: AppItem?
              @State private var showDetail = false
              @State private var searchText = ""
              @State private var isSearchFocused = false
              @State private var selectedCategory: String = "الكل"
              @State private var sortMode: AppSortMode = .newest
              @Environment(\.colorScheme) var scheme
          
              enum AppSortMode: String, CaseIterable {
                  case newest = "الأحدث"; case popular = "الأشهر"; case name = "الاسم"; case size = "الحجم"
              }
          
              var categories: [String] {
                  var cats = ["الكل"]
                  let found = Set(appsManager.apps.compactMap { $0.category }).sorted()
                  cats += found.isEmpty ? ["ترفيه", "أدوات", "ألعاب", "اجتماعي", "تعليم"] : Array(found)
                  return cats
              }
          
              var filteredApps: [AppItem] {
                  var base = appsManager.apps
                  if selectedCategory != "الكل" {
                      base = base.filter { $0.category == selectedCategory }
                  }
                  if !searchText.isEmpty {
                      base = base.filter {
                          $0.name.localizedCaseInsensitiveContains(searchText) ||
                          $0.localizedDescription.localizedCaseInsensitiveContains(searchText) ||
                          $0.developerName.localizedCaseInsensitiveContains(searchText)
                      }
                  }
                  switch sortMode {
                  case .newest:  return base
                  case .popular: return base.sorted { (Int($0.down) ?? 0) > (Int($1.down) ?? 0) }
                  case .name:    return base.sorted { $0.name < $1.name }
                  case .size:    return base.sorted { $0.size > $1.size }
                  }
              }
          
              var body: some View {
                  VStack(spacing: 14) {
                      // Header
                      HStack(spacing: 12) {
