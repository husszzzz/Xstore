                                  ForEach(downloadManager.ipaFiles) { file in
                                      IPAFileCard(
                                          file: file,
                                          hasValidCert: certificateManager.selectedCertificate?.isValid == true,
                                          onSign:    { selectedFile = file },
                                          onInstall: { handleInstall(file: file) },
                                          onShare:   { shareIPA(file: file) },
                                          onDelete:  { downloadManager.deleteIPAFile(file) },
                                          onEdit:    { patchFile = file }
                                      ).padding(.horizontal)
                                  }
                              }
                          }
                      } else if selectedSegment == 1 {
                          if downloadManager.activeDownloads.isEmpty {
                              VStack(spacing: 12) {
                                  Image(systemName: "icloud.and.arrow.down").font(.system(size: 50))
                                      .foregroundColor(.gray.opacity(0.4))
                                  Text("لا توجد تحميلات نشطة").font(.system(size: 15)).foregroundColor(.gray)
                              }.frame(maxWidth: .infinity).padding(.top, 60)
                          } else {
                              LazyVStack(spacing: 12) {
                                  ForEach(downloadManager.activeDownloads) { dl in
                                      ActiveDownloadCard(download: dl, downloadManager: downloadManager).padding(.horizontal)
                                  }
                              }
                          }
                      } else {
                          tagsSection.padding(.horizontal)
                      }
                  }
                  .sheet(isPresented: $showIPAPicker) {
                      DocumentPicker(types: [.init(filenameExtension: "ipa") ?? .data]) { url in
                          downloadManager.importIPAFromURL(url: url)
                      }
                  }
                  .sheet(item: $patchFile) { file in
                      IPAPatchSheet(file: file, downloadManager: downloadManager)
                  }
                  .sheet(item: $selectedFile) { file in
                      SigningSheetView(
                          ipaFile: file, certificates: certificateManager.certificates,
                          selectedCertId: certificateManager.selectedCertificate?.id,
                          onSign: { cert in selectedFile = nil; performSigning(file: file, cert: cert) }
                      )
                  }
                  .sheet(isPresented: $showInstallSheet) {
                      if let file = pendingInstallFile {
                          VIP21FullInstallView(
                              file: file,
                              certificateManager: certificateManager,
                              downloadManager: downloadManager
                          )
                      }
                  }
                  .overlay(signingProgress.map { p in SigningProgressOverlay(progress: p, status: signingStatus) })
                  .sheet(isPresented: $pendingRecovery) {
                      NavigationView {
                          ScrollView {
                              VIP21FileRecoveryView(downloadManager: downloadManager)
                          }
                          .navigationTitle("استرداد الملفات")
                          .navigationBarTitleDisplayMode(.inline)
                          .toolbar {
                              ToolbarItem(placement: .navigationBarTrailing) {
