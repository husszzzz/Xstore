              func fetchApps() {
                  isLoading = true; errorMessage = nil
                  guard let url = URL(string: AppConstants.storeURL) else { isLoading = false; return }
                  URLSession.shared.dataTask(with: url) { [weak self] data, _, err in
                      DispatchQueue.main.async {
                          self?.isLoading = false
                          if let err = err { self?.errorMessage = err.localizedDescription; return }
                          guard let data = data else { self?.errorMessage = "لا توجد بيانات"; return }
                          var loaded: [AppItem] = []
                          if let resp = try? JSONDecoder().decode(AppsResponse.self, from: data) {
                              loaded = resp.apps
                          } else if let arr = try? JSONDecoder().decode([AppItem].self, from: data) {
                              loaded = arr
                          } else {
                              self?.errorMessage = "فشل تحليل البيانات"; return
                          }
                          self?.apps = loaded.map { app in
                              var mutable = app
                              if mutable.category == nil || mutable.category!.isEmpty {
