        run: |
          mkdir -p Resources
          cat > Resources/Info.plist << 'PEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>          <string>VIP21Store</string>
              <key>CFBundleIdentifier</key>          <string>com.vip21.store</string>
              <key>CFBundleName</key>                <string>21s</string>
              <key>CFBundleDisplayName</key>         <string>21s</string>
              <key>CFBundlePackageType</key>         <string>APPL</string>
              <key>CFBundleShortVersionString</key>  <string>7.0</string>
              <key>CFBundleVersion</key>             <string>7</string>
              <key>LSRequiresIPhoneOS</key>          <true/>
              <key>MinimumOSVersion</key>            <string>16.0</string>
