                      HStack(spacing: 8) {
                          if isLoading {
                              ProgressView().progressViewStyle(CircularProgressViewStyle(tint: .white)).scaleEffect(0.85)
                          } else if let icon { Image(systemName: icon).font(.system(size: 15, weight: .semibold)) }
                          Text(isLoading ? "جاري..." : title).font(.system(size: 15, weight: .bold))
                      }
                      .foregroundColor(.white).frame(maxWidth: .infinity).frame(height: 48)
                      .background(LinearGradient(
