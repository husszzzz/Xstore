              func startDownload(app: AppItem) {
                  if activeDownloads.contains(where: { $0.appName == app.name &&
                      ($0.status == .downloading || $0.status == .waiting) }) {
                      statusMessage = "التحميل قيد التقدم لـ \(app.name)"; return
                  }
                  guard let url = URL(string: app._secureDownloadURL) else { downloadError = "رابط التحميل غير صالح"; return }
                  isDownloading = true; downloadError = nil
                  statusMessage = "بدء تحميل \(app.name)..."
                  HapticManager.shared.impact(.medium)
          
                  let download = ActiveDownload(appName: app.name, appIconURL: app.iconURL, downloadURL: url, appItem: app)
                  download.status = .downloading
                  download.destinationURL = documentsPath
                      .appendingPathComponent("\(app.name.replacingOccurrences(of: "/", with: "_"))_\(UUID().uuidString).ipa")
          
                  var req = URLRequest(url: url); req.timeoutInterval = 120
                  let task = urlSession.dataTask(with: req)
                  download.task = task
                  DispatchQueue.main.async { self.activeDownloads.append(download); task.resume() }
